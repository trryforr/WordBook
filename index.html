function renderLessonPractice(lesson) {
  const practices = lesson.practice || [];
  if (!practices.length) return '<div class="empty"><div class="empty-i">✏️</div><div class="empty-t">Practice exercises coming soon.</div></div>';
  return practices.map((p, i) => {
    const typeLabel = { fill_blank:'Fill in the Blank', sentence_making:'Sentence Making', paraphrase:'Paraphrasing' }[p.type] || p.type;
    const typeColor = { fill_blank:'color:var(--ac2)', sentence_making:'color:var(--grn)', paraphrase:'color:var(--gold)' }[p.type] || '';
    let body = '';
    if (p.type === 'fill_blank') {
      const q = (p.question||'').replace(/_+/g, '<span class="blank">_____</span>');
      body = `<div class="pi-q">${q}</div>`;
    } else if (p.type === 'sentence_making') {
      body = `<div class="pi-q">${p.instruction}</div>`;
    } else {
      body = `<div class="pi-q" style="font-style:italic;border-left:3px solid var(--gold);padding-left:12px">"${p.original}"</div><div class="pi-q" style="margin-top:8px">${p.instruction}</div>`;
    }
    return `<div class="practice-item">
      <div class="pi-type" style="${typeColor}">G${i+1}. ${typeLabel}</div>
      ${body}
      <button class="pi-ans-btn" onclick="toggleAns(this)">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Show Sample Answer
      </button>
      <div class="pi-answer">${p.sampleAnswer || (p.answers||[]).join(', ')}</div>
    </div>`;
  }).join('');
}

function toggleAns(btn) {
  const ans = btn.nextElementSibling;
  ans.classList.toggle('show');
  btn.innerHTML = ans.classList.contains('show')
    ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/></svg> Hide Answer'
    : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Show Sample Answer';
}

// ═══════════════════════════════════════════
// WORD CARDS
// ═══════════════════════════════════════════
function renderWordCards(words) {
  if (!words.length) return '<div class="empty"><div class="empty-i">📭</div><div class="empty-t">No words in this lesson yet.</div></div>';
  const posTypes = [...new Set(words.map(w => w.pos))];
  const filtered = posFilter ? words.filter(w => w.pos === posFilter) : words;
  const pillsHtml = posTypes.length > 1 ? `
    <div class="wh-filters">
      <button class="wf-pill${!posFilter?' on':''}" onclick="setPosF('')">All</button>
      ${posTypes.map(p => `<button class="wf-pill${posFilter===p?' on':''}" onclick="setPosF('${p}')">${POS_LABEL[p]||p}</button>`).join('')}
    </div>` : '';
  return `
    <div class="words-header">
      <div class="wh-title">${filtered.length} word entr${filtered.length!==1?'ies':'y'}</div>
      ${pillsHtml}
    </div>
    <div class="words-list">
      ${filtered.map((w,i) => wordCardHtml(w, i)).join('')}
    </div>`;
}

function wordCardHtml(w, i) {
  const hasTts = D.meta?.ttsEnabled !== false;
  const d = Math.min(i, 8) * 0.04;
  const ml = w.meaningLayers || {};
  const lr = w.lexicalRelations || {};
  const mo = w.morphology || {};
  const ui = w.usageInLesson || {};

  const secs = [
    {
      id: `ml-${w.id}`, icon: '🔍', label: 'Meaning Layers',
      html: `<div class="ml-grid">
        ${ml.literal ? `<div class="ml-item"><div class="ml-dot" style="background:var(--ac)"></div><div class="ml-lbl">Literal</div><div class="ml-text">${ml.literal}</div></div>` : ''}
        ${ml.contextual ? `<div class="ml-item"><div class="ml-dot" style="background:var(--gold)"></div><div class="ml-lbl">Contextual</div><div class="ml-text">${ml.contextual}</div></div>` : ''}
        ${ml.connotation ? `<div class="ml-item"><div class="ml-dot" style="background:var(--pur)"></div><div class="ml-lbl">Connotation</div><div class="ml-text">${ml.connotation}</div></div>` : ''}
      </div>`
    },
    {
      id: `lr-${w.id}`, icon: '🔗', label: 'Lexical Relations',
      html: `<div class="lr-grid">
        <div class="lr-item"><div class="lr-lbl">Synonyms</div><div class="lr-words">${(lr.synonyms||[]).map(s=>`<span class="lr-word syn">${s}</span>`).join('')||'—'}</div></div>
        <div class="lr-item"><div class="lr-lbl">Antonyms</div><div class="lr-words">${(lr.antonyms||[]).map(s=>`<span class="lr-word ant">${s}</span>`).join('')||'—'}</div></div>
        <div class="lr-item"><div class="lr-lbl">Hypernym</div><div class="lr-words">${lr.hypernym?`<span class="lr-word hyp">${lr.hypernym}</span>`:'—'}</div></div>
        <div class="lr-item"><div class="lr-lbl">Hyponyms</div><div class="lr-words">${(lr.hyponyms||[]).map(s=>`<span class="lr-word hypo">${s}</span>`).join('')||'—'}</div></div>
      </div>`
    },
    {
      id: `mo-${w.id}`, icon: '⚗️', label: 'Morphology',
      html: `<div class="morph-grid">
        ${mo.root ? `<div class="morph-item"><span class="morph-lbl">Root</span><span class="morph-val">${mo.root}</span></div>` : ''}
        ${mo.derivatives?.length ? `<div class="morph-item"><span class="morph-lbl">Derivatives</span><div class="morph-deriv">${mo.derivatives.map(d=>`<span class="deriv-chip">${d}</span>`).join('')}</div></div>` : ''}
        ${mo.forms ? `<div class="morph-item"><span class="morph-lbl">Forms</span><span class="morph-val">${Object.entries(mo.forms).filter(([k,v])=>v&&v!=='—').map(([k,v])=>`<em style="color:var(--tx3)">${k}:</em> ${v}`).join(' · ')}</span></div>` : ''}
      </div>`
    },
    {
      id: `col-${w.id}`, icon: '📎', label: 'Collocations',
      html: `<div class="col-list">${(w.collocations||[]).map(c=>`<span class="col-chip">${c}</span>`).join('')||'—'}</div>`
    },
    {
      id: `ul-${w.id}`, icon: '📚', label: 'Usage in Lesson',
      html: `${ui.originalSentence?`<div class="ul-quote">"${ui.originalSentence}"</div>`:''}
             ${ui.explanation?`<div class="ul-explanation">${ui.explanation}</div>`:''}`
    },
    {
      id: `ex-${w.id}`, icon: '✍️', label: 'Example Sentences',
      html: `<div class="ex-list">${(w.exampleSentences||[]).map((s,i)=>`<div class="ex-item"><span class="ex-num">${i+1}.</span><span class="ex-text">${s}</span></div>`).join('')}</div>`
    },
    {
      id: `cg-${w.id}`, icon: '🧠', label: 'Cognitive Image',
      html: w.cognitiveImage ? `<div class="cog-box"><span class="cog-icon">💭</span><span>${w.cognitiveImage}</span></div>` : '—'
    },
    {
      id: `ce-${w.id}`, icon: '⚠️', label: 'Common Errors',
      html: (w.commonErrors||[]).map(e=>`<div class="err-item"><div class="err-title">⚠️ ${e.error}</div><div class="err-text">${e.explanation}</div></div>`).join('')||'—'
    }
  ];

  const secsHtml = secs.map(s => `
    <div class="ws" id="ws-${s.id}">
      <div class="ws-toggle" onclick="toggleWS('ws-${s.id}')">
        <div class="ws-toggle-left">
          <span class="ws-ico">${s.icon}</span>
          <span class="ws-lbl">${s.label}</span>
        </div>
        <span class="ws-arr">▾</span>
      </div>
      <div class="ws-body">${s.html}</div>
    </div>
  `).join('');

  return `
  <div class="wcard" style="animation-delay:${d}s" id="wcard-${w.id}">
    <div class="wcard-header">
      <div class="wcard-left">
        <div class="wcard-num">WORD CARD ${w.number || (i+1)}</div>
        <div class="wcard-word-row">
          <div class="wcard-word">${w.word}</div>
          ${hasTts ? `<button class="wcard-tts" onclick="spk('${w.id}')" title="Pronounce">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>` : ''}
        </div>
        ${w.pronunciation ? `<div class="wcard-pr">${w.pronunciation}</div>` : ''}
        <div class="wcard-pos">${w.posLabel || POS_LABEL[w.pos] || w.pos}</div>
      </div>
      <div class="wcard-right">
        <div class="wcard-cardnum">#${w.number || (i+1)}</div>
        <div class="wcard-bangla bn">${w.bangla}</div>
      </div>
    </div>
    <div class="wcard-body">
      <div class="wcard-def">${w.academicDefinition || w.denotation || ''}</div>
      <div class="wcard-sections">${secsHtml}</div>
    </div>
  </div>`;
}

function toggleWS(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}
function bindAccordions() {}

function setPosF(p) {
  posFilter = p;
  const lesson = getLesson(view.lessonId);
  if (lesson) {
    document.getElementById('lp-wordcards').innerHTML = renderWordCards(lesson.words || []);
  }
}

// ═══════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════
function handleSearch() {
  searchQ = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  renderContent();
}

function renderSearch() {
  const q = searchQ;
  const words = getAllWords().filter(w =>
    (w.word||'').toLowerCase().includes(q) ||
    (w.bangla||'').includes(q) ||
    (w.academicDefinition||'').toLowerCase().includes(q) ||
    (w.pronunciation||'').includes(q) ||
    (w.collocations||[]).some(c => c.toLowerCase().includes(q))
  );
  if (!words.length) return `<div class="view on"><div class="empty"><div class="empty-i">🔍</div><div class="empty-t">No results for "<strong>${q}</strong>".</div></div></div>`;
  return `<div class="view on">
    <div class="pg-header">
      <h1 class="pg-title">Search: "${q}"</h1>
      <p class="pg-desc">${words.length} result${words.length!==1?'s':''} found</p>
    </div>
    <div class="words-list">${words.map((w,i)=>wordCardHtml(w,i)).join('')}</div>
  </div>`;
}

function searchWord(word) {
  const inp = document.getElementById('searchInput');
  if (inp) { inp.value = word; searchQ = word.toLowerCase(); renderContent(); }
}

// ═══════════════════════════════════════════
// TTS
// ═══════════════════════════════════════════
let ttsActive = null;
function spk(id) {
  const w = getAllWords().find(x => x.id === id);
  if (!w || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(w.word);
  u.lang = 'en-US'; u.rate = 0.85;
  const vs = window.speechSynthesis.getVoices();
  const v = vs.find(x => x.lang.startsWith('en') && x.localService) || vs.find(x => x.lang.startsWith('en'));
  if (v) u.voice = v;
  const btn = document.querySelector(`#wcard-${id} .wcard-tts`);
  if (btn) { btn.classList.add('sp'); ttsActive = btn; }
  u.onend = u.onerror = () => { ttsActive?.classList.remove('sp'); ttsActive = null; };
  window.speechSynthesis.speak(u);
}
if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

// ═══════════════════════════════════════════
// QUIZ ENGINE
// ═══════════════════════════════════════════
const QTYPES = [
  { id:'en2bn', icon:'🇬🇧→🇧🇩', name:'English → Bangla', desc:'See the word, give its Bangla meaning' },
  { id:'bn2en', icon:'🇧🇩→🇬🇧', name:'Bangla → English', desc:'See the Bangla, guess the English word' },
  { id:'def2en', icon:'📖→🔤', name:'Definition → Word', desc:'Read the definition, name the word' },
  { id:'col2en', icon:'📎→🔤', name:'Collocation Fill', desc:'Complete the collocation phrase' },
  { id:'syn', icon:'🔗', name:'Synonym Match', desc:'Match words with their synonyms' },
  { id:'ant', icon:'↔️', name:'Antonym Match', desc:'Match words with their antonyms' },
  { id:'morph', icon:'⚗️', name:'Morphology', desc:'Complete the word family chain' },
  { id:'usage', icon:'📚', name:'Contextual Usage', desc:'Fill the blank in the lesson sentence' },
  { id:'error', icon:'⚠️', name:'Error Spotter', desc:'Identify the common usage error' },
  { id:'mixed', icon:'🎲', name:'Mixed Mode', desc:'Random mix of all question types' },
];

function openQuiz() {
  const units = getUnits();
  const secOpts = `<option value="">All Words</option>
    ${units.map(u => `<option value="${u.id}">Unit ${u.number}: ${u.title}</option>`).join('')}
    ${getAllLessons().map(l => `<option value="l:${l.id}">Lesson ${l.number}: ${l.title}</option>`).join('')}`;

  const qtypesHtml = QTYPES.map(t => `
    <label class="qtype">
      <input type="radio" name="qtype" value="${t.id}" ${t.id==='en2bn'?'checked':''}>
      <span class="qtype-icon">${t.icon}</span>
      <div class="qtype-info">
        <div class="qtype-name">${t.name}</div>
        <div class="qtype-desc">${t.desc}</div>
      </div>
    </label>
  `).join('');

  document.getElementById('quizShell').innerHTML = `
    <div class="qs-header">
      <div class="qs-title">🧠 Active Recall Quiz</div>
      <button class="qs-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="qs-body">
      <div class="qs-row">
        <div class="qs-lbl">Quiz Scope</div>
        <select class="qs-select" id="qzScope">${secOpts}</select>
      </div>
      <div class="qs-row">
        <div class="qs-lbl">Question Type</div>
        <div class="qtype-grid">${qtypesHtml}</div>
      </div>
      <div class="qs-row">
        <div class="qs-lbl">Number of Questions</div>
        <div class="qcount-row">
          ${[5,10,20,'All'].map(n => `<button class="qcnt${n===10?' on':''}" onclick="setQCnt(${n==='All'?999:n},this)">${n}</button>`).join('')}
        </div>
      </div>
      <button class="qs-start" onclick="startQuiz()">Start Quiz →</button>
    </div>`;
  QZ.total = 10;
  document.getElementById('quizModal').classList.add('open');
}

function closeQuiz() {
  window.speechSynthesis?.cancel();
  document.getElementById('quizModal').classList.remove('open');
}

function setQCnt(n, btn) {
  QZ.total = n;
  document.querySelectorAll('.qcnt').forEach(b => b.classList.toggle('on', b === btn));
}

function startQuiz() {
  const scope = document.getElementById('qzScope').value;
  const type = document.querySelector('input[name="qtype"]:checked')?.value || 'en2bn';
  let pool = getAllWords().filter(w => w.word && w.bangla);

  if (scope.startsWith('l:')) {
    const lid = scope.slice(2);
    pool = pool.filter(w => getLesson(lid)?.words?.some(lw => lw.id === w.id));
  } else if (scope) {
    const unit = getUnit(scope);
    if (unit) pool = pool.filter(w => (unit.lessons||[]).some(l => (l.words||[]).some(lw => lw.id === w.id)));
  }

  if (!pool.length) { alert('No words found for this scope.'); return; }
  pool = pool.sort(() => Math.random() - .5);
  const n = Math.min(QZ.total, pool.length);
  QZ.queue = pool.slice(0, n);
  QZ.pool = pool;
  QZ.idx = 0; QZ.score = 0; QZ.missed = [];
  QZ.type = type;
  renderQPlay();
}

function getQType() {
  if (QZ.type === 'mixed') {
    const types = ['en2bn','bn2en','def2en','col2en','usage'];
    return types[Math.floor(Math.random() * types.length)];
  }
  return QZ.type;
}

function renderQPlay() {
  if (QZ.idx >= QZ.queue.length) { renderQResults(); return; }
  const w = QZ.queue[QZ.idx];
  const tot = QZ.queue.length;
  const pct = QZ.idx / tot * 100;
  const ctype = getQType();
  QZ.ctype = ctype;
  QZ.revealed = false;

  let prompt = '', hint = '', isWord = false, isBn = false, isDef = false;
  if (ctype === 'en2bn') { prompt = w.word; hint = w.pronunciation||''; isWord = true; }
  else if (ctype === 'bn2en') { prompt = w.bangla; hint = 'POS: '+(POS_LABEL[w.pos]||w.pos); isBn = true; }
  else if (ctype === 'def2en') { prompt = w.academicDefinition || w.denotation || ''; hint = 'POS: '+(POS_LABEL[w.pos]||w.pos); isDef = true; }
  else if (ctype === 'col2en') {
    const col = (w.collocations||[])[0];
    if (col) { prompt = col.replace(w.word.toLowerCase(), '_____').replace(w.word, '_____') || col; hint = 'Fill in the collocation'; }
    else { prompt = w.word; hint = ''; isWord = true; }
  } else if (ctype === 'usage') {
    const ui = w.usageInLesson?.originalSentence || '';
    const regex = new RegExp(w.word, 'gi');
    prompt = ui ? ui.replace(regex, '_____') : w.word;
    hint = 'Fill in the blank from the lesson';
    isDef = true;
  } else if (ctype === 'syn' || ctype === 'ant') {
    prompt = w.word; hint = ctype === 'syn' ? 'Give a synonym' : 'Give an antonym'; isWord = true;
  } else if (ctype === 'morph') {
    prompt = w.word; hint = 'Name a derivative form'; isWord = true;
  } else if (ctype === 'error') {
    const err = (w.commonErrors||[])[0];
    prompt = err ? 'Error: ' + err.error : w.word; hint = 'Identify the correct usage'; isDef = true;
  }

  const lbl = { en2bn:'English → Bangla', bn2en:'Bangla → English', def2en:'Definition → Word', col2en:'Collocation Fill', syn:'Synonym Match', ant:'Antonym Match', morph:'Morphology', usage:'Contextual Usage', error:'Error Spotter', mixed:'Mixed Mode' }[ctype] || '';

  document.getElementById('quizShell').innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%">
      <div class="qp-progress">
        <button class="qs-close" onclick="renderQSetupBack()" style="width:30px;height:30px;flex-shrink:0">‹</button>
        <div class="qp-bar-wrap">
          <div class="qp-bar"><div class="qp-fill" style="width:${pct}%"></div></div>
          <div class="qp-txt">${QZ.idx+1} of ${tot}</div>
        </div>
        <div class="qp-score">${QZ.score} ✓</div>
      </div>
      <div class="qp-body">
        <div class="qp-type-lbl">${lbl}</div>
        <div class="qp-card" id="qpCard">
          <div class="qp-word${isBn?' bn':isDef?' df':''}">${prompt}</div>
          ${hint ? `<div class="qp-hint">${hint}</div>` : ''}
          ${isWord && D.meta?.ttsEnabled!==false ? `<button class="qp-tts" onclick="spkWord('${w.word}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>` : ''}
        </div>
        <div id="qpRevealArea">
          <button class="qp-reveal" onclick="revealQ()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Reveal Answer
          </button>
        </div>
      </div>
    </div>`;
}

function revealQ() {
  const w = QZ.queue[QZ.idx];
  const ct = QZ.ctype;
  QZ.revealed = true;
  let main = '', sub = '';
  if (ct === 'en2bn') { main = w.bangla; sub = w.academicDefinition||w.denotation||''; }
  else if (ct === 'bn2en') { main = w.word; sub = w.pronunciation ? w.pronunciation + ' · ' + (w.academicDefinition||'').slice(0,80)+'…' : ''; }
  else if (ct === 'def2en') { main = w.word; sub = w.bangla; }
  else if (ct === 'col2en') { main = (w.collocations||[])[0]||w.word; sub = ''; }
  else if (ct === 'usage') { main = w.word; sub = w.usageInLesson?.explanation||''; }
  else if (ct === 'syn') { main = (w.lexicalRelations?.synonyms||[])[0]||'—'; sub = ''; }
  else if (ct === 'ant') { main = (w.lexicalRelations?.antonyms||[])[0]||'—'; sub = ''; }
  else if (ct === 'morph') { main = (w.morphology?.derivatives||[])[0]||w.word; sub = ''; }
  else if (ct === 'error') { main = (w.commonErrors||[])[0]?.explanation||w.word; sub = ''; sub = ''; }
  const isBn = ct === 'en2bn';

  if (ct === 'bn2en' || ct === 'def2en' || ct === 'usage') {
    setTimeout(() => { try { const u=new SpeechSynthesisUtterance(w.word);u.lang='en-US';u.rate=.85;window.speechSynthesis?.speak(u); } catch(e){} }, 300);
  }

  document.getElementById('qpRevealArea').innerHTML = `
    <div class="qp-answer">
      <div class="qa-main${isBn?' bn':''}">${main}</div>
      ${sub ? `<div class="qa-sub">${sub}</div>` : ''}
    </div>
    <div class="qp-judge">
      <button class="qjb wrong" onclick="judgeQ(false)">✗ Got it Wrong</button>
      <button class="qjb right" onclick="judgeQ(true)">✓ Got it Right</button>
    </div>`;
}

function judgeQ(ok) {
  const w = QZ.queue[QZ.idx];
  if (ok) QZ.score++;
  else QZ.missed.push(w);
  const card = document.getElementById('qpCard');
  if (card) {
    card.style.borderColor = ok ? 'rgba(63,185,80,.5)' : 'rgba(248,81,73,.5)';
    card.style.background = ok ? 'rgba(63,185,80,.04)' : 'rgba(248,81,73,.04)';
  }
  setTimeout(() => { QZ.idx++; renderQPlay(); }, 500);
}

function spkWord(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word); u.lang = 'en-US'; u.rate = .85;
  const v = window.speechSynthesis.getVoices().find(x => x.lang.startsWith('en'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

function renderQResults() {
  const { queue, score, missed } = QZ;
  const tot = queue.length, pct = Math.round(score/tot*100);
  const trophy = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  const title = pct>=90?'Outstanding!':pct>=70?'Great Work!':pct>=50?'Good Effort!':'Keep Practicing!';
  const dashOffset = 264 - (pct/100)*264;

  document.getElementById('quizShell').innerHTML = `
    <div class="qs-header">
      <div class="qs-title">Quiz Complete</div>
      <button class="qs-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="qr-body">
      <div class="qr-trophy">${trophy}</div>
      <div class="qr-title">${title}</div>
      <div class="qr-ring">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="8"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="var(--gold2)" stroke-width="8"
            stroke-dasharray="264" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
            transform="rotate(-90 50 50)" style="transition:stroke-dashoffset 1.2s ease"/>
        </svg>
        <div class="qr-ring-text">
          <div class="qr-pct">${pct}%</div>
          <div class="qr-pct-lbl">score</div>
        </div>
      </div>
      <div class="qr-stats">
        <div class="qr-stat"><div class="qr-stat-v g">${score}</div><div class="qr-stat-l">Correct</div></div>
        <div class="qr-stat"><div class="qr-stat-v r">${missed.length}</div><div class="qr-stat-l">Missed</div></div>
        <div class="qr-stat"><div class="qr-stat-v">${tot}</div><div class="qr-stat-l">Total</div></div>
      </div>
      ${missed.length ? `<div class="qr-missed">
        <div class="qr-missed-t">Words to Review</div>
        <div class="qr-missed-list">${missed.map(w=>`<span class="qr-missed-w">${w.word}</span>`).join('')}</div>
      </div>` : ''}
      <div class="qr-actions">
        <button class="qr-btn s" onclick="openQuiz()">New Quiz</button>
        ${missed.length ? `<button class="qr-btn p" onclick="retryMissed()">Retry Missed</button>` : ''}
        <button class="qr-btn s" onclick="closeQuiz()">Close</button>
      </div>
    </div>`;
}

function retryMissed() {
  const m = [...QZ.missed];
  QZ.queue = m.sort(()=>Math.random()-.5); QZ.idx=0; QZ.score=0; QZ.missed=[];
  renderQPlay();
}

function renderQSetupBack() {
  window.speechSynthesis?.cancel();
  openQuiz();
}

// ═══════════════════════════════════════════
// SIDEBAR TOGGLE (MOBILE)
// ═══════════════════════════════════════════
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sidebarOpen = !sidebarOpen;
  sb.classList.toggle('open', sidebarOpen);
}
function closeSidebar() {
  sidebarOpen = false;
  document.getElementById('sidebar')?.classList.remove('open');
}
document.addEventListener('click', e => {
  const sb = document.getElementById('sidebar');
  const hb = document.getElementById('hamburger');
  if (sb?.classList.contains('open') && !sb.contains(e.target) && !hb?.contains(e.target)) {
    closeSidebar();
  }
});

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function showEl(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { const el = document.getElementById(id); if(el){el.style.display='none';el.classList?.remove('show');} }
function setTxt(id, txt) { const el = document.getElementById(id); if(el) el.textContent = txt; }

// Close quiz on overlay click
document.getElementById('quizModal').addEventListener('click', e => {
  if (e.target === document.getElementById('quizModal')) closeQuiz();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeQuiz();
});

// ═══════════════════════════════════════════
boot();
</script>
