<title>WordBook</title>
<meta name="description" content="Deep vocabulary learning for SSC & HSC students — Bengali meanings, semantic maps, active recall quizzes.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,600;1,700&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   DESIGN SYSTEM — Refined Academic Dark
   ══════════════════════════════════════════ */
:root {
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #1c2128;
  --bg4:      #21262d;
  --surf:     #1c2128;
  --surf2:    #242b33;
  --bd:       #30363d;
  --bd2:      #3d444d;

  --tx:       #e6edf3;
  --tx2:      #adbac7;
  --tx3:      #768390;
  --tx4:      #545d68;

  --ac:       #2f81f7;
  --ac2:      #58a6ff;
  --ac-g:     rgba(47,129,247,.12);
  --ac-gb:    rgba(47,129,247,.06);

  --gold:     #d4a017;
  --gold2:    #f0c040;
  --gold-g:   rgba(212,160,23,.12);

  --grn:      #3fb950;
  --grn-g:    rgba(63,185,80,.1);
  --red:      #f85149;
  --red-g:    rgba(248,81,73,.1);
  --amb:      #d29922;
  --pur:      #a371f7;
  --pur-g:    rgba(163,113,247,.1);
  --teal:     #39d353;

  --ff: 'Playfair Display', Georgia, serif;
  --fn: 'Sora', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --fb: 'Noto Sans Bengali', sans-serif;

  --r4: 4px; --r8: 8px; --r12: 12px;
  --r16: 16px; --r20: 20px; --r24: 24px;
  --t: .15s ease;
  --t2: .25s ease;
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
input,select,textarea{font-family:inherit}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* ── UTILITY ── */
.hide{display:none!important}
.bn{font-family:var(--fb)}
.mono{font-family:var(--fm)}
.serif{font-family:var(--ff)}

/* ══ LOADING SCREEN ══ */
#loadScr{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .5s ease;
}
.ld-logo{
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,var(--ac),var(--pur));
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;
  box-shadow:0 0 40px rgba(47,129,247,.3);
  animation:ldpulse 2s ease-in-out infinite;
}
@keyframes ldpulse{0%,100%{box-shadow:0 0 40px rgba(47,129,247,.3)}50%{box-shadow:0 0 60px rgba(47,129,247,.5)}}
.ld-title{font-family:var(--ff);font-size:1.6rem;font-weight:700;color:var(--tx)}
.ld-sub{font-size:.78rem;color:var(--tx3);font-family:var(--fm);letter-spacing:.08em}
.ld-bar{width:200px;height:2px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:8px}
.ld-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--pur));border-radius:99px;animation:ldfill 1.6s ease-in-out infinite}
@keyframes ldfill{0%{width:0;margin-left:0}50%{width:75%;margin-left:12.5%}100%{width:0;margin-left:100%}}

/* ══ BOOK SELECTOR ══ */
#bookSelector{
  position:fixed;inset:0;z-index:900;
  background:var(--bg);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.bs-header{
  padding:48px 24px 32px;text-align:center;
  background:radial-gradient(ellipse at 50% 0%,rgba(47,129,247,.08) 0%,transparent 70%);
  border-bottom:1px solid var(--bd);
}
.bs-logo{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--ac),var(--pur));
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;margin:0 auto 16px;
  box-shadow:0 8px 32px rgba(47,129,247,.25);
}
.bs-title{font-family:var(--ff);font-size:2rem;font-weight:900;color:var(--tx);margin-bottom:6px}
.bs-sub{font-size:.83rem;color:var(--tx3)}
.bs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:32px 24px;max-width:960px;margin:0 auto;width:100%}
.bcard{
  background:var(--surf);border:1px solid var(--bd);border-radius:var(--r16);
  padding:22px;cursor:pointer;transition:all var(--t2);
  display:flex;flex-direction:column;gap:12px;
  position:relative;overflow:hidden;
}
.bcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);pointer-events:none}
.bcard:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.bcard-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden}
.bcard-icon img{width:100%;height:100%;object-fit:cover}
.bcard-title{font-family:var(--ff);font-size:1.05rem;font-weight:700;color:var(--tx)}
.bcard-sub{font-family:var(--fb);font-size:.8rem;color:var(--tx3)}
.bcard-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.bcard-tag{padding:2px 9px;border-radius:99px;font-size:.66rem;font-weight:600;font-family:var(--fm);background:var(--ac-g);color:var(--ac2);border:1px solid rgba(47,129,247,.2)}
.bcard-open{margin-top:auto;padding:8px 16px;background:var(--ac-g);border:1px solid rgba(47,129,247,.25);border-radius:var(--r8);color:var(--ac2);font-size:.78rem;font-weight:600;width:fit-content;transition:all var(--t)}
.bcard:hover .bcard-open{background:var(--ac);color:white;border-color:var(--ac)}

/* ══ COVER SCREEN ══ */
#coverScr{
  position:fixed;inset:0;z-index:800;
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.cv-hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px;text-align:center;
  position:relative;overflow:hidden;
}
.cv-bg{position:absolute;inset:0;z-index:0}
.cv-bg-img{width:100%;height:100%;object-fit:cover;filter:blur(24px) brightness(.35) saturate(1.6);transform:scale(1.08)}
.cv-bg-grad{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,17,23,.6) 0%,rgba(13,17,23,.85) 60%,rgba(13,17,23,1) 100%)}
.cv-bg-color{position:absolute;inset:0}
.cv-content{position:relative;z-index:1;max-width:600px;width:100%}
.cv-back{position:absolute;top:20px;left:20px;z-index:2;padding:8px 14px;border-radius:var(--r8);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--tx2);font-size:.76rem;display:flex;align-items:center;gap:6px;transition:all var(--t)}
.cv-back:hover{background:rgba(255,255,255,.1);color:var(--tx)}
.cv-book{
  width:110px;height:110px;border-radius:24px;
  margin:0 auto 28px;
  display:flex;align-items:center;justify-content:center;
  font-size:3.2rem;overflow:hidden;
  border:2px solid rgba(255,255,255,.12);
  box-shadow:0 24px 60px rgba(0,0,0,.5);
  animation:cvIn .7s cubic-bezier(.34,1.56,.64,1) both;
}
.cv-book img{width:100%;height:100%;object-fit:cover}
@keyframes cvIn{from{opacity:0;transform:scale(.6) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.cv-exam{font-size:.65rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-family:var(--fm);margin-bottom:10px;animation:fadeUp .5s ease both .1s}
.cv-title{font-family:var(--ff);font-size:clamp(1.9rem,5vw,3.2rem);font-weight:900;color:white;letter-spacing:-.02em;line-height:1.1;margin-bottom:8px;animation:fadeUp .5s ease both .15s}
.cv-subtitle{font-family:var(--fb);font-size:1.05rem;margin-bottom:5px;animation:fadeUp .5s ease both .2s}
.cv-author{font-size:.78rem;color:rgba(255,255,255,.45);font-style:italic;margin-bottom:20px;animation:fadeUp .5s ease both .22s}
.cv-divider{width:48px;height:2px;margin:0 auto 20px;border-radius:99px;animation:fadeUp .5s ease both .25s}
.cv-welcome{max-width:460px;margin:0 auto 36px;font-size:.88rem;color:rgba(255,255,255,.6);line-height:1.75;animation:fadeUp .5s ease both .28s}
.cv-cta{
  padding:14px 44px;border-radius:99px;color:white;
  font-size:.98rem;font-weight:700;letter-spacing:.03em;
  transition:all var(--t2);
  box-shadow:0 8px 28px rgba(0,0,0,.4);
  animation:fadeUp .5s ease both .33s;
  display:inline-flex;align-items:center;gap:8px;
}
.cv-cta:hover{transform:translateY(-3px) scale(1.03);box-shadow:0 16px 48px rgba(0,0,0,.5)}
.cv-stats{display:flex;gap:24px;justify-content:center;margin-top:32px;flex-wrap:wrap;animation:fadeUp .5s ease both .38s}
.cv-stat{text-align:center}
.cv-stat-n{font-family:var(--ff);font-size:1.6rem;font-weight:900;color:white;line-height:1}
.cv-stat-l{font-size:.63rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;font-family:var(--fm);margin-top:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ══ MAIN APP ══ */
#app{display:none;flex-direction:column;min-height:100vh}
#app.show{display:flex}

/* TOPBAR */
.topbar{
  position:sticky;top:0;z-index:200;height:54px;
  background:rgba(13,17,23,.92);backdrop-filter:blur(20px) saturate(1.8);
  border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 16px;gap:10px;
}
.tb-brand{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.tb-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;overflow:hidden}
.tb-icon img{width:100%;height:100%;object-fit:cover}
.tb-name{font-family:var(--ff);font-size:.9rem;font-weight:700;color:var(--tx)}
.tb-gap{flex:1}
.tb-search-wrap{position:relative;display:flex;align-items:center;flex:1;max-width:380px}
.tb-search-icon{position:absolute;left:11px;color:var(--tx4);pointer-events:none}
.tb-search{
  width:100%;padding:7px 12px 7px 34px;
  background:var(--bg3);border:1.5px solid var(--bd);border-radius:99px;
  color:var(--tx);font-size:.82rem;outline:none;transition:all var(--t);
}
.tb-search:focus{border-color:var(--ac);background:var(--bg2);box-shadow:0 0 0 3px var(--ac-gb)}
.tb-acts{display:flex;align-items:center;gap:6px}
.tb-btn{
  padding:6px 13px;border-radius:var(--r8);font-size:.75rem;font-weight:600;
  display:flex;align-items:center;gap:5px;transition:all var(--t);
}
.tb-btn.quiz{background:linear-gradient(135deg,var(--ac),var(--pur));color:white;box-shadow:0 2px 12px rgba(47,129,247,.25)}
.tb-btn.quiz:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(47,129,247,.4)}
.tb-btn.bk{border:1px solid var(--bd2);color:var(--tx3)}
.tb-btn.bk:hover{border-color:var(--ac2);color:var(--ac2)}
.tb-hamburger{display:none;width:34px;height:34px;border-radius:var(--r8);background:var(--bg3);border:1px solid var(--bd);align-items:center;justify-content:center;color:var(--tx2);flex-shrink:0}

/* LAYOUT */
.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{
  width:248px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--bd);
  position:sticky;top:54px;height:calc(100vh - 54px);
  overflow-y:auto;display:flex;flex-direction:column;
  transition:transform var(--t2);
}
.sidebar::-webkit-scrollbar{width:3px}
.content{flex:1;overflow-y:auto;min-width:0}

/* SIDEBAR */
.sb-book{
  padding:14px 14px 12px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:9px;
}
.sb-book-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;overflow:hidden}
.sb-book-icon img{width:100%;height:100%;object-fit:cover}
.sb-book-title{font-family:var(--ff);font-size:.82rem;font-weight:700;color:var(--tx);line-height:1.3}
.sb-book-sub{font-family:var(--fb);font-size:.69rem;color:var(--tx3);margin-top:1px}
.sb-section{padding:0 6px;margin:10px 0 4px}
.sb-sec-lbl{font-size:.58rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--tx4);font-family:var(--fm);padding:0 6px}
.sb-item{
  display:flex;align-items:center;gap:7px;
  padding:6px 10px;border-radius:var(--r8);
  cursor:pointer;transition:all var(--t);
  width:100%;text-align:left;margin-bottom:1px;
}
.sb-item:hover{background:var(--bg3)}
.sb-item.on{background:var(--ac-g);border:1px solid rgba(47,129,247,.2)}
.sb-item-icon{font-size:.88rem;flex-shrink:0;width:18px;text-align:center}
.sb-item-text{flex:1;font-size:.78rem;color:var(--tx2);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item.on .sb-item-text{color:var(--ac2)}
.sb-item-cnt{font-size:.63rem;color:var(--tx4);font-family:var(--fm);flex-shrink:0}
.sb-unit{margin-bottom:4px}
.sb-unit-hd{
  display:flex;align-items:center;gap:7px;
  padding:7px 10px;border-radius:var(--r8);
  cursor:pointer;transition:all var(--t);width:100%;text-align:left;
}
.sb-unit-hd:hover{background:var(--bg3)}
.sb-unit-hd.on{background:var(--ac-g)}
.sb-unit-num{
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.63rem;font-weight:800;font-family:var(--fm);
  background:var(--bg4);color:var(--tx3);
  border:1px solid var(--bd);
}
.sb-unit-hd.on .sb-unit-num{background:var(--ac-g);color:var(--ac2);border-color:rgba(47,129,247,.3)}
.sb-unit-title{flex:1;font-size:.8rem;font-weight:600;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-unit-hd.on .sb-unit-title{color:var(--ac2)}
.sb-unit-arr{font-size:.65rem;color:var(--tx4);transition:transform var(--t)}
.sb-unit-hd.expanded .sb-unit-arr{transform:rotate(90deg)}
.sb-lessons{display:none;padding-left:12px}
.sb-lessons.open{display:block}
.sb-lesson{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:var(--r8);
  cursor:pointer;transition:all var(--t);width:100%;text-align:left;margin-bottom:1px;
  border-left:2px solid transparent;
}
.sb-lesson:hover{background:var(--bg3);border-left-color:var(--bd2)}
.sb-lesson.on{background:var(--ac-gb);border-left-color:var(--ac)}
.sb-lesson-num{font-size:.62rem;font-family:var(--fm);color:var(--tx4);flex-shrink:0}
.sb-lesson-title{flex:1;font-size:.76rem;color:var(--tx3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-lesson.on .sb-lesson-title{color:var(--ac2)}

/* ══ CONTENT AREA VIEWS ══ */
.view{display:none;padding:28px 28px 80px;max-width:1000px;margin:0 auto}
.view.on{display:block}

/* PAGE HEADER */
.pg-header{margin-bottom:28px}
.pg-breadcrumb{display:flex;align-items:center;gap:6px;font-size:.71rem;color:var(--tx4);font-family:var(--fm);margin-bottom:10px;flex-wrap:wrap}
.pg-bc-sep{opacity:.4}
.pg-bc-link{cursor:pointer;transition:color var(--t)}
.pg-bc-link:hover{color:var(--ac2)}
.pg-label{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-family:var(--fm);margin-bottom:7px}
.pg-title{font-family:var(--ff);font-size:clamp(1.5rem,3vw,2.1rem);font-weight:900;color:var(--tx);letter-spacing:-.02em;line-height:1.15;margin-bottom:8px}
.pg-desc{font-size:.86rem;color:var(--tx2);line-height:1.7;max-width:680px}
.pg-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.pg-tag{padding:3px 11px;border-radius:99px;font-size:.67rem;font-weight:600;font-family:var(--fm);background:var(--bg3);border:1px solid var(--bd);color:var(--tx3)}

/* BOOK HOME VIEW */
.parts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:32px}
.part-card{
  background:var(--surf);border:1px solid var(--bd);border-radius:var(--r16);
  padding:18px;cursor:pointer;transition:all var(--t2);
}
.part-card:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.part-card-icon{font-size:1.6rem;margin-bottom:10px}
.part-card-title{font-family:var(--ff);font-size:.92rem;font-weight:700;color:var(--tx);margin-bottom:3px}
.part-card-sub{font-size:.72rem;color:var(--tx3);line-height:1.5}

/* UNIT VIEW */
.unit-overview{
  background:var(--surf);border:1px solid var(--bd);border-radius:var(--r16);
  padding:22px 24px;margin-bottom:24px;
}
.ov-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.ov-item{}
.ov-label{font-size:.61rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx4);font-family:var(--fm);margin-bottom:5px}
.ov-text{font-size:.82rem;color:var(--tx2);line-height:1.6}
.lessons-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.lesson-card{
  background:var(--surf);border:1px solid var(--bd);border-radius:var(--r16);
  padding:18px 20px;cursor:pointer;transition:all var(--t2);
  display:flex;align-items:flex-start;gap:14px;
}
.lesson-card:hover{border-color:var(--ac);background:var(--surf2)}
.lesson-num{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:800;font-family:var(--fm);color:var(--tx3);
}
.lesson-card:hover .lesson-num{background:var(--ac-g);color:var(--ac2);border-color:rgba(47,129,247,.3)}
.lesson-info{flex:1}
.lesson-title{font-family:var(--ff);font-size:1rem;font-weight:700;color:var(--tx);margin-bottom:4px}
.lesson-excerpt{font-size:.78rem;color:var(--tx3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lesson-meta{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.lesson-badge{padding:2px 8px;border-radius:99px;font-size:.63rem;font-weight:600;font-family:var(--fm);background:var(--bg3);border:1px solid var(--bd);color:var(--tx4)}

/* SEMANTIC FIELD MAP */
.sem-map{
  background:var(--surf);border:1px solid var(--bd);border-radius:var(--r16);
  padding:22px 24px;margin-bottom:20px;
}
.sem-title{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-family:var(--fm);color:var(--tx4);margin-bottom:14px}
.sem-core-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sem-core-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-family:var(--fm);color:var(--gold);white-space:nowrap}
.sem-core-words{display:flex;gap:6px;flex-wrap:wrap}
.sem-core-word{padding:4px 12px;border-radius:99px;font-size:.76rem;font-weight:600;background:var(--gold-g);border:1px solid rgba(212,160,23,.25);color:var(--gold2)}
.sem-sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.sem-sub{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r12);padding:13px 14px}
.sem-sub-name{font-size:.67rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);font-family:var(--fm);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.sem-sub-words{display:flex;gap:4px;flex-wrap:wrap}
.sem-sub-word{padding:2px 8px;border-radius:6px;font-size:.72rem;background:var(--bg4);border:1px solid var(--bd);color:var(--tx3);cursor:pointer;transition:all var(--t)}
.sem-sub-word:hover{border-color:var(--ac2);color:var(--ac2)}

/* LESSON VIEW */
.lesson-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--r12);padding:4px;margin-bottom:22px;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none}
.lesson-tabs::-webkit-scrollbar{display:none}
.ltab{
  padding:7px 14px;border-radius:var(--r8);font-size:.76rem;font-weight:600;
  color:var(--tx3);white-space:nowrap;transition:all var(--t);flex-shrink:0;
}
.ltab:hover{color:var(--tx);background:rgba(255,255,255,.05)}
.ltab.on{background:var(--surf2);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.3)}

.lesson-panel{display:none}
.lesson-panel.on{display:block}

/* Text Summary Panel */
.summary-card{
  background:var(--surf);border:1px solid var(--bd);border-radius:var(--r16);
  padding:22px 24px;margin-bottom:16px;
}
.sc-label{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-family:var(--fm);color:var(--tx4);margin-bottom:10px}
.sc-text{font-size:.88rem;color:var(--tx2);line-height:1.8}
.key-ideas-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.ki{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r12);padding:14px 16px}
.ki-label{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:var(--fm);margin-bottom:5px}
.ki-text{font-size:.8rem;color:var(--tx2);line-height:1.6}

/* Word Categories Panel */
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.cat-box{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r12);padding:14px 16px}
.cat-label{font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:var(--fm);margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
.cat-words{display:flex;gap:5px;flex-wrap:wrap}
.cat-word{
  padding:3px 10px;border-radius:99px;font-size:.74rem;font-weight:500;
  cursor:pointer;transition:all var(--t);
  background:var(--bg3);border:1px solid var(--bd);color:var(--tx3);
}
.cat-word:hover{background:var(--ac-g);border-color:rgba(47,129,247,.25);color:var(--ac2)}

/* Contextual Usage Panel */
.cu-item{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r12);padding:16px 18px;margin-bottom:10px}
.cu-word{font-family:var(--ff);font-size:1.05rem;font-weight:700;color:var(--tx);margin-bottom:10px}
.cu-quote{
  padding:12px 16px;background:var(--bg3);border-left:3px solid var(--ac);
  border-radius:0 var(--r8) var(--r8) 0;font-style:italic;
  font-size:.84rem;color:var(--tx2);margin-bottom:10px;
}
.cu-why{font-size:.8rem;color:var(--tx3);line-height:1.7}

/* Semantic Network Panel */
.sn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.sn-box{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r12);padding:14px 16px}
.sn-label{font-size:.61rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:var(--fm);color:var(--tx4);margin-bottom:8px}
.sn-words{display:flex;gap:5px;flex-wrap:wrap}
.sn-word{padding:3px 9px;border-radius:6px;font-size:.74rem;background:var(--grn-g);border:1px solid rgba(63,185,80,.2);color:var(--grn)}
.opp-pair{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd)}
.opp-pair:last-child{border-bottom:none}
.opp-w{font-size:.82rem;font-weight:600;color:var(--tx);flex:1}
.opp-m{font-size:.72rem;color:var(--tx4);flex:1}
.opp-vs{font-size:.65rem;font-family:var(--fm);color:var(--tx4);padding:0 4px}

/* Practice Panel */
.practice-item{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r12);padding:16px 18px;margin-bottom:10px}
.pi-type{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-family:var(--fm);margin-bottom:8px}
.pi-q{font-size:.86rem;color:var(--tx);line-height:1.7;margin-bottom:12px}
.blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--ac);color:var(--ac2);font-weight:600;text-align:center;padding:0 4px}
.pi-ans-btn{padding:7px 16px;border-radius:var(--r8);background:var(--bg3);border:1px solid var(--bd2);color:var(--tx3);font-size:.76rem;font-weight:600;transition:all var(--t);display:flex;align-items:center;gap:6px}
.pi-ans-btn:hover{border-color:var(--ac2);color:var(--ac2)}
.pi-answer{display:none;margin-top:12px;padding:12px 14px;background:var(--grn-g);border:1px solid rgba(63,185,80,.2);border-radius:var(--r8);font-size:.82rem;color:var(--grn);line-height:1.6}
.pi-answer.show{display:block}

/* ══ WORD CARDS ══ */
.words-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.wh-title{font-size:.8rem;font-weight:600;color:var(--tx2)}
.wh-filters{display:flex;gap:6px;flex-wrap:wrap}
.wf-pill{padding:4px 12px;border-radius:99px;font-size:.71rem;font-weight:600;border:1.5px solid var(--bd);color:var(--tx3);background:var(--bg3);transition:all var(--t);cursor:pointer}
.wf-pill:hover{border-color:var(--ac2);color:var(--ac2)}
.wf-pill.on{background:var(--ac);border-color:var(--ac);color:white}
.words-list{display:flex;flex-direction:column;gap:14px}

/* WORD CARD */
.wcard{
  background:var(--surf);border:1px solid var(--bd);border-radius:var(--r20);
  overflow:hidden;animation:wci .25s ease both;transition:border-color var(--t2);
}
@keyframes wci{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.wcard:hover{border-color:var(--bd2)}
.wcard-header{
  display:grid;grid-template-columns:1fr auto;
  padding:18px 22px 0;gap:12px;align-items:start;
}
.wcard-left{}
.wcard-num{font-size:.6rem;font-family:var(--fm);color:var(--tx4);margin-bottom:3px;font-weight:600;letter-spacing:.1em}
.wcard-word-row{display:flex;align-items:center;gap:9px;margin-bottom:4px}
.wcard-word{font-family:var(--ff);font-size:1.55rem;font-weight:900;color:var(--tx);letter-spacing:-.02em;line-height:1}
.wcard-tts{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:var(--ac-g);border:1px solid rgba(47,129,247,.2);
  display:flex;align-items:center;justify-content:center;color:var(--ac2);
  transition:all var(--t);
}
.wcard-tts:hover{background:var(--ac);color:white;transform:scale(1.1)}
.wcard-tts.sp{background:var(--ac);color:white;animation:spk .8s ease-in-out infinite alternate}
@keyframes spk{from{box-shadow:0 0 0 0 rgba(47,129,247,.4)}to{box-shadow:0 0 0 8px transparent}}
.wcard-pr{font-family:var(--fm);font-size:.74rem;color:var(--tx4);letter-spacing:.02em;margin-bottom:5px}
.wcard-pos{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:.64rem;font-weight:700;letter-spacing:.07em;font-family:var(--fm);background:var(--ac-g);color:var(--ac2);border:1px solid rgba(47,129,247,.2)}
.wcard-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.wcard-cardnum{font-size:.6rem;font-family:var(--fm);color:var(--tx4);background:var(--bg3);padding:2px 8px;border-radius:6px;border:1px solid var(--bd)}
.wcard-bangla{font-family:var(--fb);font-size:1.05rem;font-weight:700;color:var(--gold2);text-align:right;line-height:1.4}

/* Word card sections */
.wcard-body{padding:0 22px 18px}
.wcard-def{
  margin:14px 0 0;
  padding:13px 16px;
  background:var(--bg3);border-radius:var(--r12);
  font-size:.84rem;color:var(--tx2);line-height:1.75;
  font-style:italic;border-left:3px solid var(--ac);
}

.wcard-sections{margin-top:14px;display:flex;flex-direction:column;gap:2px}
.ws{border:1px solid var(--bd);border-radius:var(--r12);overflow:hidden}
.ws-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;cursor:pointer;transition:all var(--t);
  background:var(--bg3);
  user-select:none;
}
.ws-toggle:hover{background:var(--bg4)}
.ws-toggle-left{display:flex;align-items:center;gap:8px}
.ws-ico{font-size:.85rem}
.ws-lbl{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:var(--fm);color:var(--tx3)}
.ws-arr{font-size:.62rem;color:var(--tx4);transition:transform var(--t)}
.ws.open .ws-arr{transform:rotate(180deg)}
.ws-body{display:none;padding:14px 16px;background:var(--surf)}
.ws.open .ws-body{display:block}

/* Meaning Layers */
.ml-grid{display:flex;flex-direction:column;gap:8px}
.ml-item{display:flex;gap:10px;align-items:flex-start}
.ml-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ml-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-family:var(--fm);color:var(--tx4);min-width:76px;flex-shrink:0;margin-top:2px}
.ml-text{font-size:.82rem;color:var(--tx2);line-height:1.6;flex:1}

/* Lexical Relations */
.lr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lr-item{}
.lr-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-family:var(--fm);color:var(--tx4);margin-bottom:5px}
.lr-words{display:flex;gap:4px;flex-wrap:wrap}
.lr-word{
  padding:3px 9px;border-radius:6px;font-size:.74rem;
  background:var(--bg3);border:1px solid var(--bd);color:var(--tx3);
  cursor:pointer;transition:all var(--t);
}
.lr-word.syn:hover{background:var(--grn-g);border-color:rgba(63,185,80,.3);color:var(--grn)}
.lr-word.ant:hover{background:var(--red-g);border-color:rgba(248,81,73,.3);color:var(--red)}
.lr-word.hyp{background:rgba(163,113,247,.08);border-color:rgba(163,113,247,.2);color:var(--pur)}
.lr-word.hypo{background:rgba(212,160,23,.08);border-color:rgba(212,160,23,.2);color:var(--gold2)}

/* Morphology */
.morph-grid{display:flex;flex-direction:column;gap:7px}
.morph-item{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
.morph-lbl{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-family:var(--fm);color:var(--tx4);min-width:72px;flex-shrink:0}
.morph-val{font-size:.82rem;color:var(--tx2);line-height:1.5}
.morph-deriv{display:flex;gap:5px;flex-wrap:wrap}
.deriv-chip{padding:2px 9px;border-radius:6px;font-size:.72rem;background:var(--pur-g);border:1px solid rgba(163,113,247,.2);color:var(--pur)}

/* Collocations */
.col-list{display:flex;gap:6px;flex-wrap:wrap}
.col-chip{
  padding:4px 12px;border-radius:99px;font-size:.76rem;
  background:var(--bg3);border:1px solid var(--bd);color:var(--tx3);
  font-style:italic;
}

/* Usage in Lesson */
.ul-quote{
  padding:13px 16px;background:var(--bg3);border-left:3px solid var(--gold);
  border-radius:0 var(--r8) var(--r8) 0;font-style:italic;
  font-size:.84rem;color:var(--tx2);margin-bottom:10px;line-height:1.7;
}
.ul-explanation{font-size:.82rem;color:var(--tx3);line-height:1.7}

/* Example Sentences */
.ex-list{display:flex;flex-direction:column;gap:7px}
.ex-item{display:flex;gap:9px;align-items:baseline}
.ex-num{font-size:.63rem;font-family:var(--fm);color:var(--tx4);font-weight:700;flex-shrink:0;width:16px}
.ex-text{font-size:.82rem;color:var(--tx2);line-height:1.65;font-style:italic}

/* Cognitive Image */
.cog-box{
  padding:13px 16px;background:linear-gradient(135deg,rgba(163,113,247,.06),rgba(47,129,247,.06));
  border:1px solid rgba(163,113,247,.15);border-radius:var(--r12);
  font-size:.82rem;color:var(--tx2);line-height:1.7;
  display:flex;gap:10px;align-items:flex-start;
}
.cog-icon{font-size:1.2rem;flex-shrink:0}

/* Common Errors */
.err-item{background:var(--red-g);border:1px solid rgba(248,81,73,.18);border-radius:var(--r12);padding:12px 14px;margin-bottom:7px}
.err-item:last-child{margin-bottom:0}
.err-title{font-size:.72rem;font-weight:700;color:var(--red);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.err-text{font-size:.8rem;color:var(--tx3);line-height:1.6}

/* ══ QUIZ MODAL ══ */
.quiz-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(6px);z-index:600;
  display:none;align-items:stretch;
}
.quiz-overlay.open{display:flex}
.quiz-shell{
  width:100%;max-width:700px;margin:auto;
  background:var(--bg2);border:1px solid var(--bd2);border-radius:var(--r24);
  max-height:94vh;overflow-y:auto;display:flex;flex-direction:column;
  animation:qin .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes qin{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* Quiz Setup */
.qs-header{
  padding:22px 24px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
}
.qs-title{font-family:var(--ff);font-size:1.2rem;font-weight:700}
.qs-close{width:30px;height:30px;border-radius:50%;background:var(--bg3);color:var(--tx3);display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.qs-close:hover{background:var(--bd2);color:var(--tx)}
.qs-body{padding:22px 24px;flex:1}
.qs-row{margin-bottom:18px}
.qs-lbl{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:var(--fm);color:var(--tx4);margin-bottom:8px}
.qs-select{width:100%;padding:9px 13px;background:var(--bg3);border:1.5px solid var(--bd);border-radius:var(--r8);color:var(--tx);font-size:.84rem;outline:none;transition:border-color var(--t)}
.qs-select:focus{border-color:var(--ac)}
.qtype-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.qtype{
  padding:12px 13px;background:var(--bg3);border:1.5px solid var(--bd);
  border-radius:var(--r12);cursor:pointer;transition:all var(--t);
  display:flex;align-items:flex-start;gap:9px;
}
.qtype:has(input:checked){border-color:var(--ac);background:var(--ac-g)}
.qtype input{display:none}
.qtype-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.qtype-info{}
.qtype-name{font-size:.77rem;font-weight:600;color:var(--tx2);margin-bottom:1px}
.qtype:has(input:checked) .qtype-name{color:var(--ac2)}
.qtype-desc{font-size:.67rem;color:var(--tx4);line-height:1.4}
.qcount-row{display:flex;gap:6px;flex-wrap:wrap}
.qcnt{padding:6px 14px;border-radius:var(--r8);background:var(--bg3);border:1.5px solid var(--bd);color:var(--tx3);font-size:.78rem;font-weight:600;transition:all var(--t)}
.qcnt.on{background:var(--ac-g);border-color:rgba(47,129,247,.35);color:var(--ac2)}
.qcnt:hover{border-color:var(--bd2)}
.qs-start{
  margin-top:22px;width:100%;padding:13px;
  background:linear-gradient(135deg,var(--ac),var(--pur));
  border-radius:var(--r12);color:white;font-size:.95rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all var(--t2);box-shadow:0 4px 20px rgba(47,129,247,.25);
}
.qs-start:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(47,129,247,.4)}

/* Quiz Play */
.qp-progress{
  padding:14px 22px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:14px;flex-shrink:0;
}
.qp-bar-wrap{flex:1}
.qp-bar{height:5px;background:var(--bd);border-radius:99px;overflow:hidden}
.qp-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--pur));border-radius:99px;transition:width .4s ease}
.qp-txt{font-size:.69rem;color:var(--tx4);margin-top:4px;font-family:var(--fm)}
.qp-score{padding:3px 12px;background:var(--grn-g);border:1px solid rgba(63,185,80,.25);border-radius:99px;font-size:.76rem;font-weight:700;color:var(--grn);white-space:nowrap}
.qp-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:28px 24px;gap:18px}
.qp-type-lbl{font-size:.63rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-family:var(--fm);color:var(--tx4)}
.qp-card{
  width:100%;max-width:480px;min-height:160px;
  background:var(--bg3);border:2px solid var(--bd);border-radius:var(--r20);
  padding:32px 28px;text-align:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);transition:all .3s;
}
.qp-word{font-family:var(--ff);font-size:2rem;font-weight:900;color:var(--tx);line-height:1.1}
.qp-word.bn{font-family:var(--fb);font-size:1.6rem;color:var(--gold2)}
.qp-word.df{font-size:.95rem;font-style:italic;color:var(--tx2);line-height:1.75;font-family:var(--fn)}
.qp-word.sm{font-size:.88rem;color:var(--tx3);font-style:italic;font-family:var(--fn);line-height:1.7}
.qp-hint{font-size:.73rem;color:var(--tx4);font-family:var(--fm)}
.qp-tts{width:34px;height:34px;border-radius:50%;background:var(--ac-g);border:1px solid rgba(47,129,247,.2);color:var(--ac2);display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.qp-tts:hover{background:var(--ac);color:white}
.qp-reveal{
  padding:11px 28px;background:var(--bg3);border:1.5px solid var(--bd2);
  border-radius:var(--r16);color:var(--tx2);font-size:.86rem;font-weight:600;
  display:flex;align-items:center;gap:7px;transition:all var(--t);
}
.qp-reveal:hover{border-color:var(--ac2);color:var(--ac2)}
.qp-answer{
  width:100%;max-width:480px;
  background:var(--ac-gb);border:1px solid rgba(47,129,247,.2);
  border-radius:var(--r16);padding:16px 20px;text-align:center;
  animation:qans .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes qans{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.qa-main{font-family:var(--ff);font-size:1.4rem;font-weight:700;color:var(--tx)}
.qa-main.bn{font-family:var(--fb);font-size:1.2rem;color:var(--gold2)}
.qa-sub{font-size:.78rem;color:var(--tx3);margin-top:5px;font-style:italic;line-height:1.5}
.qp-judge{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:480px}
.qjb{
  padding:12px;border-radius:var(--r12);font-size:.86rem;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all var(--t);border:1.5px solid;
}
.qjb.wrong{background:var(--red-g);border-color:rgba(248,81,73,.3);color:var(--red)}
.qjb.wrong:hover{background:rgba(248,81,73,.2);transform:scale(1.02)}
.qjb.right{background:var(--grn-g);border-color:rgba(63,185,80,.3);color:var(--grn)}
.qjb.right:hover{background:rgba(63,185,80,.2);transform:scale(1.02)}

/* Fill blank quiz */
.qfb-input{
  width:100%;max-width:400px;padding:11px 16px;
  background:var(--bg4);border:2px solid var(--bd);border-radius:var(--r12);
  color:var(--tx);font-size:.92rem;outline:none;text-align:center;
  transition:border-color var(--t);font-family:var(--fn);
}
.qfb-input:focus{border-color:var(--ac)}
.qfb-submit{
  padding:10px 28px;background:var(--ac);border-radius:var(--r12);
  color:white;font-size:.85rem;font-weight:700;transition:all var(--t);
}
.qfb-submit:hover{filter:brightness(1.15);transform:scale(1.03)}

/* Match quiz */
.qmatch-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:500px}
.qmatch-col{display:flex;flex-direction:column;gap:7px}
.qmatch-item{
  padding:10px 14px;border:1.5px solid var(--bd);border-radius:var(--r12);
  cursor:pointer;transition:all var(--t);font-size:.82rem;text-align:center;
  background:var(--bg3);
}
.qmatch-item:hover{border-color:var(--ac2)}
.qmatch-item.selected{border-color:var(--ac);background:var(--ac-g);color:var(--ac2)}
.qmatch-item.matched{border-color:var(--grn);background:var(--grn-g);color:var(--grn);cursor:default}
.qmatch-item.wrong{border-color:var(--red);background:var(--red-g);color:var(--red)}

/* Quiz Results */
.qr-body{padding:40px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
.qr-trophy{font-size:3.5rem;animation:trp .6s cubic-bezier(.34,1.56,.64,1) both .2s}
@keyframes trp{from{opacity:0;transform:scale(0) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.qr-title{font-family:var(--ff);font-size:1.8rem;font-weight:900;color:var(--tx)}
.qr-ring{position:relative;width:140px;height:140px}
.qr-ring svg{width:100%;height:100%}
.qr-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.qr-pct{font-family:var(--ff);font-size:2rem;font-weight:900;color:var(--gold2)}
.qr-pct-lbl{font-size:.63rem;color:var(--tx4);text-transform:uppercase;letter-spacing:.1em;font-family:var(--fm)}
.qr-stats{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.qr-stat{padding:12px 20px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r12);min-width:80px}
.qr-stat-v{font-family:var(--ff);font-size:1.6rem;font-weight:800;line-height:1}
.qr-stat-v.g{color:var(--grn)}
.qr-stat-v.r{color:var(--red)}
.qr-stat-l{font-size:.67rem;color:var(--tx4);margin-top:3px;font-family:var(--fm)}
.qr-missed{width:100%;max-width:500px;text-align:left}
.qr-missed-t{font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:var(--fm);color:var(--tx4);margin-bottom:8px}
.qr-missed-list{display:flex;flex-wrap:wrap;gap:5px}
.qr-missed-w{padding:3px 11px;background:var(--red-g);border:1px solid rgba(248,81,73,.25);border-radius:99px;font-size:.76rem;color:var(--red);font-family:var(--ff)}
.qr-actions{display:flex;gap:9px;flex-wrap:wrap;justify-content:center}
.qr-btn{padding:10px 22px;border-radius:var(--r12);font-size:.86rem;font-weight:700;transition:all var(--t);border:1.5px solid}
.qr-btn.p{background:linear-gradient(135deg,var(--ac),var(--pur));border-color:transparent;color:white;box-shadow:0 4px 18px rgba(47,129,247,.25)}
.qr-btn.p:hover{transform:translateY(-2px)}
.qr-btn.s{background:transparent;border-color:var(--bd2);color:var(--tx3)}
.qr-btn.s:hover{border-color:var(--tx);color:var(--tx)}

/* ══ MISC ══ */
.divider{height:1px;background:var(--bd);margin:20px 0}
.empty{text-align:center;padding:60px 20px}
.empty-i{font-size:3rem;margin-bottom:12px}
.empty-t{font-size:.88rem;color:var(--tx3);line-height:1.7}
.err-banner{margin:30px auto;max-width:520px;padding:18px 22px;background:var(--red-g);border:1px solid rgba(248,81,73,.2);border-radius:var(--r16);text-align:center;color:var(--red);font-size:.84rem;line-height:1.7}
.err-banner code{font-family:var(--fm);font-size:.9em}

.scr{display:none}
.scr.on{display:block}

  .cat-grid{grid-template-columns:1fr}
  .qtype-grid{grid-template-columns:1fr}
  .wcard-header{grid-template-columns:1fr}
  .wcard-right{flex-direction:row;align-items:center;justify-content:space-between;flex-wrap:wrap}
  .quiz-shell{border-radius:var(--r16) var(--r16) 0 0;margin-top:auto;max-height:92vh}
  .sem-sub-grid{grid-template-columns:1fr}

}

  .cv-title{font-size:1.8rem}
  .pg-title{font-size:1.4rem}
  .wcard-word{font-size:1.3rem}

}

<body>

<!-- ══ LOADING ══ -->
<div id="loadScr">
  <div class="ld-logo" id="ldIco">📘</div>
  <div class="ld-title" id="ldTitle">WordBook</div>
  <div class="ld-sub" id="ldSub">LOADING VOCABULARY…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<!-- ══ BOOK SELECTOR ══ -->
<div id="bookSelector" style="display:none">
  <div class="bs-header">
    <div class="bs-logo">📚</div>
    <h1 class="bs-title">WordBook</h1>
    <p class="bs-sub">Choose a vocabulary book to open</p>
  </div>
  <div class="bs-grid" id="bsGrid"></div>
</div>

<!-- ══ COVER SCREEN ══ -->
<div id="coverScr" style="display:none">
  <button class="cv-back" onclick="showSelector()" id="cvBack" style="display:none">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>All Books
  </button>
  <div class="cv-hero">
    <div class="cv-bg">
      <img id="cvBgImg" class="cv-bg-img" style="display:none" alt="">
      <div class="cv-bg-color" id="cvBgColor"></div>
      <div class="cv-bg-grad"></div>
    </div>
    <div class="cv-content">
      <div class="cv-book" id="cvBook">📘</div>
      <div class="cv-exam" id="cvExam" style="color:var(--ac2)"></div>
      <h1 class="cv-title" id="cvTitle">WordBook</h1>
      <div class="cv-subtitle bn" id="cvSub" style="color:rgba(255,255,255,.7)"></div>
      <div class="cv-author" id="cvAuthor"></div>
      <div class="cv-divider" id="cvDiv"></div>
      <div class="cv-welcome" id="cvWelcome" style="display:none"></div>
      <button class="cv-cta" id="cvCta" onclick="enterReader()">Open Book →</button>
      <div class="cv-stats" id="cvStats"></div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <header class="topbar">
    <button class="tb-hamburger" id="hamburger" onclick="toggleSidebar()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="tb-brand" onclick="showCover()">
      <div class="tb-icon" id="appIcon">📘</div>
      <div class="tb-name" id="appName">WordBook</div>
    </div>
    <div class="tb-gap"></div>
    <div class="tb-search-wrap" id="searchWrap">
      <svg class="tb-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="tb-search" type="text" id="searchInput" placeholder="Search words, meanings…" oninput="handleSearch()">
    </div>
    <div class="tb-acts">
      <button class="tb-btn quiz" id="quizBtn" onclick="openQuiz()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Quiz
      </button>
      <button class="tb-btn bk" onclick="showSelector()" id="switchBtn" style="display:none">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Books
      </button>
    </div>
  </header>
  <div class="app-body">
    <aside class="sidebar" id="sidebar">
      <div class="sb-book">
        <div class="sb-book-icon" id="sbIcon">📘</div>
        <div>
          <div class="sb-book-title" id="sbTitle">WordBook</div>
          <div class="sb-book-sub bn" id="sbSub"></div>
        </div>
      </div>
      <div id="sidebarNav"></div>
    </aside>
    <div class="content" id="mainContent">
      <!-- Views rendered here -->
    </div>
  </div>
</div>

<!-- ══ QUIZ MODAL ══ -->
<div class="quiz-overlay" id="quizModal">
  <div class="quiz-shell" id="quizShell">
    <!-- Screens injected by JS -->
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONSTANTS & STATE
// ═══════════════════════════════════════════
const BOOKS_INDEX = './books.json';
let booksIndex = null;
let D = null; // current book data
let view = { type: 'home', unitId: null, lessonId: null, lessonTab: 'summary' };
let posFilter = '';
let searchQ = '';
let sidebarOpen = false;

// Quiz state
const QZ = {
  pool: [], queue: [], idx: 0, score: 0, missed: [],
  total: 10, type: 'en2bn', revealed: false,
  matchLeft: [], matchRight: [], matchSel: null, matchDone: [],
  fillAnswer: ''
};

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
async function boot() {
  try {
    const r = await fetch(BOOKS_INDEX + '?v=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    booksIndex = await r.json();
  } catch(e) {
    hideLd();
    document.getElementById('mainContent').innerHTML =
      `<div class="err-banner">⚠️ Could not load <code>books.json</code><br>${e.message}</div>`;
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').classList.add('show');
    return;
  }

  await new Promise(r => setTimeout(r, 600));
  hideLd();

  const books = booksIndex.books || [];
  if (books.length === 1) {
    await loadBook(books[0]);
  } else {
    showSelector();
  }
}

function hideLd() {
  const el = document.getElementById('loadScr');
  el.style.opacity = '0';
  setTimeout(() => el.style.display = 'none', 400);
}

// ═══════════════════════════════════════════
// BOOK SELECTOR
// ═══════════════════════════════════════════
function showSelector() {
  hide('coverScr'); hide('app');
  const books = booksIndex?.books || [];
  document.getElementById('bsGrid').innerHTML = books.map(b => `
    <div class="bcard" onclick="loadBook(${JSON.stringify(b).replace(/"/g,'&quot;')})">
      <div class="bcard-icon" style="background:${b.accentColor}22">
        ${b.icon || '📘'}
      </div>
      <div class="bcard-title">${b.title}</div>
      <div class="bcard-sub bn">${b.subtitle || ''}</div>
      <div class="bcard-meta">
        ${b.targetExam ? `<span class="bcard-tag">${b.targetExam}</span>` : ''}
        ${b.wordCount ? `<span class="bcard-tag">${b.wordCount} words</span>` : ''}
        ${b.unitCount ? `<span class="bcard-tag">${b.unitCount} units</span>` : ''}
      </div>
      <div class="bcard-open">Open Book →</div>
    </div>
  `).join('');
  showEl('bookSelector');
}

async function loadBook(bookMeta) {
  hide('bookSelector');
  showLd(bookMeta.title);
  try {
    const r = await fetch(bookMeta.file + '?v=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    D = await r.json();
  } catch(e) {
    hideLd();
    alert('Could not load book: ' + e.message);
    showSelector();
    return;
  }
  await new Promise(r => setTimeout(r, 400));
  hideLd();
  buildCover();
  showCover();
}

function showLd(title) {
  document.getElementById('ldTitle').textContent = title || 'WordBook';
  const ls = document.getElementById('loadScr');
  ls.style.display = 'flex';
  ls.style.opacity = '1';
}

// ═══════════════════════════════════════════
// COVER SCREEN
// ═══════════════════════════════════════════
function buildCover() {
  const m = D.meta || {};
  const ac = m.accentColor || '#2f81f7';
  const r = parseInt(ac.slice(1,3),16), g = parseInt(ac.slice(3,5),16), b = parseInt(ac.slice(5,7),16);

  // background
  if (m.coverImage) {
    const img = document.getElementById('cvBgImg');
    img.src = m.coverImage; img.style.display = 'block';
    document.getElementById('cvBgColor').style.background = 'transparent';
  } else {
    document.getElementById('cvBgColor').style.background =
      `radial-gradient(ellipse at 60% 30%, rgba(${r},${g},${b},.55) 0%, rgba(${Math.floor(r*.3)},${Math.floor(g*.3)},${Math.floor(b*.3)},.95) 70%)`;
  }

  // book icon
  const cb = document.getElementById('cvBook');
  cb.style.background = `linear-gradient(135deg,rgba(${r},${g},${b},.2),rgba(${r},${g},${b},.1))`;
  if (m.coverImage) cb.innerHTML = `<img src="${m.coverImage}" style="width:100%;height:100%;object-fit:cover">`;
  else cb.textContent = m.icon || '📘';

  setTxt('cvExam', m.targetExam ? `${m.targetExam} ENGLISH VOCABULARY` : '');
  document.getElementById('cvExam').style.color = ac;
  setTxt('cvTitle', m.title || 'WordBook');
  setTxt('cvSub', m.subtitle || '');
  setTxt('cvAuthor', m.author ? 'by ' + m.author : '');

  const div = document.getElementById('cvDiv');
  div.style.background = `linear-gradient(to right, ${ac}, transparent)`;

  const wm = document.getElementById('cvWelcome');
  if (m.welcome) { wm.textContent = m.welcome; wm.style.display = 'block'; }
  else wm.style.display = 'none';

  const cta = document.getElementById('cvCta');
  cta.style.background = `linear-gradient(135deg, ${ac}, ${ac}cc)`;

  // stats
  const units = getUnits();
  const words = getAllWords();
  document.getElementById('cvStats').innerHTML = `
    <div class="cv-stat"><div class="cv-stat-n">${units.length}</div><div class="cv-stat-l">Units</div></div>
    <div class="cv-stat"><div class="cv-stat-n">${getAllLessons().length}</div><div class="cv-stat-l">Lessons</div></div>
    <div class="cv-stat"><div class="cv-stat-n">${words.length}</div><div class="cv-stat-l">Words</div></div>
  `;

  // show back button only if multiple books
  const nb = (booksIndex?.books || []).length;
  document.getElementById('cvBack').style.display = nb > 1 ? 'flex' : 'none';

  // apply accent globally
  document.documentElement.style.setProperty('--ac', ac);
  document.documentElement.style.setProperty('--ac2', ac);
  document.documentElement.style.setProperty('--ac-g', `rgba(${r},${g},${b},.12)`);
  document.documentElement.style.setProperty('--ac-gb', `rgba(${r},${g},${b},.06)`);

  buildApp();
}

function showCover() {
  hide('app'); hide('bookSelector');
  showEl('coverScr');
}

function enterReader() {
  const cv = document.getElementById('coverScr');
  cv.style.opacity = '0'; cv.style.transition = 'opacity .35s ease';
  setTimeout(() => {
    cv.style.display = 'none'; cv.style.opacity = ''; cv.style.transition = '';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').classList.add('show');
    navTo({ type: 'home' });
  }, 350);
}

// ═══════════════════════════════════════════
// DATA HELPERS
// ═══════════════════════════════════════════
function getParts() { return D?.parts || []; }
function getUnitsPart() { return getParts().find(p => p.type === 'units') || null; }
function getUnits() { return getUnitsPart()?.units || []; }
function getUnit(id) { return getUnits().find(u => u.id === id) || null; }
function getAllLessons() { return getUnits().flatMap(u => u.lessons || []); }
function getLesson(id) { return getAllLessons().find(l => l.id === id) || null; }
function getAllWords() { return getAllLessons().flatMap(l => l.words || []); }
function getWord(id) { return getAllWords().find(w => w.id === id) || null; }
const POS_LABEL = { n:'Noun', v:'Verb', adj:'Adjective', adv:'Adverb', phrasal:'Phrasal Verb', other:'Other' };

// ═══════════════════════════════════════════
// APP BUILD
// ═══════════════════════════════════════════
function buildApp() {
  const m = D.meta || {};
  // topbar
  const ai = document.getElementById('appIcon');
  if (m.coverImage) ai.innerHTML = `<img src="${m.coverImage}" style="width:100%;height:100%;object-fit:cover">`;
  else ai.textContent = m.icon || '📘';
  setTxt('appName', m.title || 'WordBook');

  // sidebar header
  const si = document.getElementById('sbIcon');
  if (m.coverImage) si.innerHTML = `<img src="${m.coverImage}" style="width:100%;height:100%;object-fit:cover">`;
  else si.textContent = m.icon || '📘';
  setTxt('sbTitle', m.title || 'WordBook');
  setTxt('sbSub', m.subtitle || '');

  if (m.quizEnabled === false) document.getElementById('quizBtn').style.display = 'none';
  if (!m.searchEnabled) document.getElementById('searchWrap').style.display = 'none';
  if ((booksIndex?.books||[]).length > 1) document.getElementById('switchBtn').style.display = 'flex';

  renderSidebar();
}

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function renderSidebar() {
  const parts = getParts();
  let html = '';

  html += `<div class="sb-section">
    <div class="sb-sec-lbl">Overview</div>
    <button class="sb-item${view.type==='home'?' on':''}" onclick="navTo({type:'home'})">
      <span class="sb-item-icon">🏠</span>
      <span class="sb-item-text">Book Home</span>
    </button>
  </div>`;

  const unitsPart = getUnitsPart();
  if (unitsPart) {
    html += `<div class="sb-section"><div class="sb-sec-lbl">Units</div>`;
    (unitsPart.units || []).forEach(u => {
      const isUnitOn = view.unitId === u.id;
      const isExpanded = isUnitOn || (u.lessons||[]).some(l => l.id === view.lessonId);
      html += `<div class="sb-unit">
        <button class="sb-unit-hd${isUnitOn?' on':''}${isExpanded?' expanded':''}" 
          onclick="toggleUnit('${u.id}')">
          <div class="sb-unit-num">U${u.number}</div>
          <div class="sb-unit-title">${u.title}</div>
          <span class="sb-unit-arr">›</span>
        </button>
        <div class="sb-lessons${isExpanded?' open':''}">
          ${(u.lessons||[]).map(l => `
            <button class="sb-lesson${view.lessonId===l.id?' on':''}" 
              onclick="navTo({type:'lesson',unitId:'${u.id}',lessonId:'${l.id}'})">
              <span class="sb-lesson-num">L${l.number}</span>
              <span class="sb-lesson-title">${l.title}</span>
            </button>
          `).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('sidebarNav').innerHTML = html;
}

function toggleUnit(uid) {
  if (view.unitId === uid && view.type === 'unit') {
    navTo({ type: 'home' });
  } else {
    navTo({ type: 'unit', unitId: uid });
  }
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function navTo(v) {
  view = { ...view, ...v };
  if (v.type !== 'lesson') view.lessonId = v.lessonId || null;
  if (v.type === 'home') { view.unitId = null; view.lessonId = null; }
  renderSidebar();
  renderContent();
  closeSidebar();
  document.querySelector('.content')?.scrollTo(0, 0);
}

function renderContent() {
  const mc = document.getElementById('mainContent');
  if (searchQ) { mc.innerHTML = renderSearch(); return; }
  if (view.type === 'home') mc.innerHTML = renderHome();
  else if (view.type === 'unit') mc.innerHTML = renderUnit();
  else if (view.type === 'lesson') mc.innerHTML = renderLesson();
  else mc.innerHTML = renderHome();
  bindAccordions();
}

// ═══════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════
function renderHome() {
  const m = D.meta || {};
  const parts = getParts();
  const units = getUnits();
  const words = getAllWords();

  const partsHtml = parts.map(p => `
    <div class="part-card" onclick="handlePartClick('${p.id}')">
      <div class="part-card-icon">${p.icon}</div>
      <div class="part-card-title">${p.title}</div>
      <div class="part-card-sub">${p.subtitle || ''}</div>
    </div>
  `).join('');

  const unitsHtml = units.map(u => {
    const wc = (u.lessons||[]).reduce((s,l) => s + (l.words||[]).length, 0);
    return `
    <div class="lesson-card" onclick="navTo({type:'unit',unitId:'${u.id}'})">
      <div class="lesson-num">U${u.number}</div>
      <div class="lesson-info">
        <div class="lesson-title">${u.title}</div>
        <div class="lesson-excerpt">${u.themeOverview?.centralIdea || ''}</div>
        <div class="lesson-meta">
          <span class="lesson-badge">${(u.lessons||[]).length} lessons</span>
          <span class="lesson-badge">${wc} words</span>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="view on">
    <div class="pg-header">

function handlePartClick(pid) {

  alert(`"${p.title}" section coming soon.`);

  const ov = unit.themeOverview || {};

  const sfHtml = (unit.semanticFields || []).map(sf => renderSemanticMap(sf)).join('');

  const lessonsHtml = (unit.lessons || []).map(l => {
    const wc = (l.words||[]).length;
    return `<div class="lesson-card" onclick="navTo({type:'lesson',unitId:'${unit.id}',lessonId:'${l.id}'})">
      <div class="lesson-num">L${l.number}</div>
      <div class="lesson-info">
        <div class="lesson-title">${l.title}</div>
        <div class="lesson-excerpt">${l.summary ? l.summary.slice(0,140)+'…' : ''}</div>
        <div class="lesson-meta">
          <span class="lesson-badge">${wc} word${wc!==1?'s':''}</span>
          ${l.keyIdeas?.tone ? `<span class="lesson-badge">${l.keyIdeas.tone}</span>` : ''}

      </div>
    </div>`;
  }).join('');

  return `<div class="view on">
    <div class="pg-header">
      <div class="pg-breadcrumb">
        <span class="pg-bc-link" onclick="navTo({type:'home'})">Home</span>
        <span class="pg-bc-sep">›</span>
        <span>Unit ${unit.number}</span>
      </div>
      <div class="pg-label" style="color:var(--ac2)">UNIT ${unit.number}</div>
      <h1 class="pg-title">${unit.title}</h1>
    </div>

    <div class="unit-overview">
      <div class="ov-grid">
        <div class="ov-item">
          <div class="ov-label">Central Idea</div>
          <div class="ov-text">${ov.centralIdea || '—'}</div>
        </div>
        <div class="ov-item">
          <div class="ov-label">Cultural Meaning</div>
          <div class="ov-text">${ov.culturalMeaning || '—'}</div>
        </div>
        <div class="ov-item">
          <div class="ov-label">Moral Lesson</div>
          <div class="ov-text">${ov.moralLesson || '—'}</div>
        </div>
      </div>
    </div>

    ${sfHtml}

    <h3 style="font-family:var(--ff);font-size:.88rem;font-weight:700;color:var(--tx2);margin-bottom:12px;letter-spacing:.05em">LESSONS IN THIS UNIT</h3>

function renderSemanticMap(sf) {
  const subHtml = (sf.subFields || []).map(sub => `
    <div class="sem-sub">
      <div class="sem-sub-name">${sub.name}</div>
      <div class="sem-sub-words">
        ${(sub.words||[]).map(w => `<span class="sem-sub-word">${w}</span>`).join('')}
      </div>
    </div>
  `).join('');
  return `
    <div class="sem-map">
      <div class="sem-title">🗺 SEMANTIC FIELD MAP — ${sf.title}</div>
      <div class="sem-core-row">
        <span class="sem-core-lbl">Core Field →</span>
        <div class="sem-core-words">
          ${(sf.coreField||[]).map(w => `<span class="sem-core-word">${w}</span>`).join('')}
        </div>
      </div>
      <div class="sem-sub-grid">${subHtml}</div>
    </div>`;
}

function renderLesson() {
  const lesson = getLesson(view.lessonId);
  const unit = getUnit(view.unitId);
  if (!lesson) return '<div class="view on"><div class="empty"><div class="empty-i">🔍</div><div class="empty-t">Lesson not found.</div></div></div>';

  const tabs = [
    { id:'summary', label:'A–B Summary', icon:'📄' },
    { id:'vocab', label:'C–D Words', icon:'🔤' },

  ];

  const tabsHtml = tabs.map(t =>
    `<button class="ltab${view.lessonTab===t.id?' on':''}" onclick="switchLessonTab('${t.id}')">${t.icon} ${t.label}</button>`

  return `<div class="view on">
    <div class="pg-header">
      <div class="pg-breadcrumb">
        <span class="pg-bc-link" onclick="navTo({type:'home'})">Home</span>
        <span class="pg-bc-sep">›</span>
        <span class="pg-bc-link" onclick="navTo({type:'unit',unitId:'${unit?.id}'})">Unit ${unit?.number}: ${unit?.title}</span>
        <span class="pg-bc-sep">›</span>
        <span>Lesson ${lesson.number}</span>
      </div>
      <div class="pg-label" style="color:var(--ac2)">LESSON ${lesson.number}</div>
      <h1 class="pg-title">${lesson.title}</h1>

    <div class="lesson-tabs">${tabsHtml}</div>

    <div class="lesson-panel${view.lessonTab==='summary'?' on':''}" id="lp-summary">

      ${renderLessonVocab(lesson)}

    <div class="lesson-panel${view.lessonTab==='contextual'?' on':''}" id="lp-contextual">
      ${renderLessonContextual(lesson)}
    </div>
    <div class="lesson-panel${view.lessonTab==='network'?' on':''}" id="lp-network">
      ${renderLessonNetwork(lesson)}
    </div>
    <div class="lesson-panel${view.lessonTab==='practice'?' on':''}" id="lp-practice">

function switchLessonTab(tab) {
  view.lessonTab = tab;
  document.querySelectorAll('.ltab').forEach((b, i) => {
    const tabs = ['summary','vocab','contextual','network','practice','wordcards'];
    b.classList.toggle('on', tabs[i] === tab);
  });
  document.querySelectorAll('.lesson-panel').forEach(p => {
    p.classList.toggle('on', p.id === 'lp-' + tab);
  });
}

function renderLessonSummary(lesson) {
  const ki = lesson.keyIdeas || {};

    <div class="summary-card">
      <div class="sc-label">A. Text Summary</div>
      <div class="sc-text">${lesson.summary || '—'}</div>
    </div>
    <div class="key-ideas-grid">
      <div class="ki">
        <div class="ki-label" style="color:var(--ac2)">Theme</div>
        <div class="ki-text">${ki.theme || '—'}</div>
      </div>
      <div class="ki">
        <div class="ki-label" style="color:var(--grn)">Message</div>
        <div class="ki-text">${ki.message || '—'}</div>
      </div>
      <div class="ki">
        <div class="ki-label" style="color:var(--gold)">Tone</div>
        <div class="ki-text">${ki.tone || '—'}</div>
      </div>
    </div>`;
}

function renderLessonVocab(lesson) {
  const wc = lesson.wordCategories || {};
  const extr = lesson.vocabularyExtraction || [];

}

function renderCatBox(label, words, style) {
  return `<div class="cat-box">
    <div class="cat-label" style="${style}">${label}</div>
    <div class="cat-words">
      ${words.map(w => `<span class="cat-word" onclick="searchWord('${w}')">${w}</span>`).join('')}

}

function renderLessonContextual(lesson) {
  const cu = lesson.contextualUsage || [];

  `).join('');
}

function renderLessonNetwork(lesson) {
  const sn = lesson.semanticNetwork || {};

  return `
    <div class="sn-row">
      <div class="sn-box">
        <div class="sn-label">F1. Related Words (Family/Loss)</div>

          <span class="opp-vs">vs</span>
