<style>
/* ════════════════════════════════════════
   DESIGN TOKENS
════════════════════════════════════════ */
:root {
  --bg:#f9f6f0; --surface:#ffffff; --surface2:#f3ede3;
  --border:#e5ddd0; --border2:#d4c9b8;
  --ink:#1a150e; --ink2:#3b3025; --muted:#8a7e6e; --faint:#b5a99a;
  --gold:#b8813a; --gold2:#d4a055; --gold-pale:#fdf4e7; --gold-dim:rgba(184,129,58,.12);
  --rust:#9b3d22; --sage:#3d6b4e; --cobalt:#1e3a5f; --violet:#4a2d7a;
  --dk-bg:#0c1018; --dk-surface:#111827; --dk-card:#1a2332;
  --dk-border:#243347; --dk-border2:#2f4160;
  --dk-text:#e8eef8; --dk-muted:#637da0; --dk-faint:#3a5070;
  --dk-accent:#4a9eff; --dk-amber:#f0a030; --dk-green:#34c77c; --dk-red:#f07070;
  --font-serif:'Fraunces',Georgia,serif;
  --font-sans:'DM Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --font-bn:'Noto Sans Bengali',sans-serif;
  --r-sm:6px; --r-md:10px; --r-lg:16px; --r-xl:22px;
  --t:0.18s cubic-bezier(0.4,0,0.2,1);
  --t-spring:0.35s cubic-bezier(0.34,1.56,0.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);overflow-x:hidden;min-height:100vh;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}

/* ─── Loading Screen ─── */
#loadScreen {
  position:fixed;inset:0;background:var(--dk-bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s ease;
}
#loadScreen.fade{opacity:0;pointer-events:none}
.load-book{font-size:3.5rem;animation:loadBounce 1s ease-in-out infinite alternate;margin-bottom:20px}
@keyframes loadBounce{from{transform:translateY(0)}to{transform:translateY(-16px)}}
.load-title{font-family:var(--font-serif);font-size:1.4rem;color:#e8eef8;margin-bottom:8px}
.load-sub{font-size:.82rem;color:var(--dk-muted)}
.load-bar{width:200px;height:3px;background:var(--dk-border);border-radius:99px;margin-top:24px;overflow:hidden}
.load-bar-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold2));border-radius:99px;animation:loadFill 1.4s ease forwards}
@keyframes loadFill{from{width:0}to{width:100%}}
.load-err{color:var(--dk-red);font-size:.82rem;margin-top:16px;display:none;text-align:center;max-width:320px;line-height:1.6}
.load-err a{color:var(--dk-amber);text-decoration:underline}

/* ─── Reader Topbar ─── */
.reader-topbar {
  position:sticky;top:0;z-index:100;
  background:rgba(249,246,240,.92);backdrop-filter:blur(20px) saturate(150%);
  border-bottom:1px solid var(--border);
  height:58px;padding:0 28px;
  display:flex;align-items:center;gap:16px;
}
.rtb-brand{display:flex;align-items:center;gap:10px;font-family:var(--font-serif);font-weight:700;font-size:1.05rem;color:var(--cobalt);white-space:nowrap}
.rtb-brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.rtb-brand-name{display:flex;flex-direction:column;gap:1px}
.rtb-brand-main{font-size:.95rem;color:var(--cobalt)}
.rtb-brand-bn{font-family:var(--font-bn);font-size:.7rem;color:var(--muted);font-weight:400}
.rtb-divider{width:1px;height:22px;background:var(--border2);margin:0 2px}
.rtb-search-wrap{flex:1;max-width:420px;position:relative}
.rtb-search{width:100%;height:36px;padding:0 14px 0 38px;background:var(--surface);border:1.5px solid var(--border2);border-radius:99px;color:var(--ink);font-size:.875rem;outline:none;transition:all var(--t)}
.rtb-search:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-dim)}
.rtb-search::placeholder{color:var(--faint)}
.rtb-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none}
.rtb-quiz-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--r-md);color:white;font-size:.8rem;font-weight:600;transition:all var(--t);white-space:nowrap;box-shadow:0 2px 8px rgba(184,129,58,.3);margin-left:auto}
.rtb-quiz-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(184,129,58,.4)}

/* ─── Layout ─── */
.reader-layout{display:flex;min-height:calc(100vh - 58px)}
.reader-toc{width:268px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.toc-inner{padding-bottom:28px}
.toc-bookinfo{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.toc-book-name{font-family:var(--font-serif);font-size:1.05rem;font-weight:700;color:var(--cobalt);line-height:1.3}
.toc-book-bn{font-family:var(--font-bn);font-size:.82rem;color:var(--muted);margin-top:3px}
.toc-section-label{padding:16px 20px 6px;font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-family:var(--font-sans)}
.toc-all-btn{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:all var(--t);border-bottom:1px solid var(--border);margin-bottom:4px}
.toc-all-btn:hover,.toc-all-btn.active{background:var(--gold-pale);border-left-color:var(--gold)}
.toc-all-icon{width:28px;height:28px;background:var(--surface2);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0}
.toc-all-text{font-size:.875rem;font-weight:600;color:var(--ink2)}
.toc-all-btn.active .toc-all-text{color:var(--gold)}
.toc-all-count{margin-left:auto;font-size:.72rem;color:var(--faint)}
.toc-ch-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;border-left:3px solid transparent;transition:all var(--t)}
.toc-ch-item:hover,.toc-ch-item.active{background:var(--gold-pale);border-left-color:var(--gold)}
.toc-ch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.8)}
.toc-ch-name{font-size:.845rem;color:var(--ink2);flex:1;line-height:1.3}
.toc-ch-item.active .toc-ch-name{color:var(--gold);font-weight:600}
.toc-ch-cnt{font-size:.68rem;color:var(--faint)}
.reader-content{flex:1;min-width:0;padding:48px 56px 100px;max-width:980px}

/* ─── Chapter Header ─── */
.ch-header{margin-bottom:44px;padding-bottom:28px;border-bottom:1px solid var(--border);position:relative}
.ch-header::after{content:'';position:absolute;bottom:-1px;left:0;width:64px;height:2px;background:linear-gradient(to right,var(--gold),transparent)}
.ch-label{display:inline-flex;align-items:center;gap:6px;font-size:.65rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-family:var(--font-mono);margin-bottom:10px}
.ch-label::before{content:'';display:inline-block;width:20px;height:1.5px;background:var(--gold)}
.ch-title{font-family:var(--font-serif);font-size:2.2rem;font-weight:700;color:var(--cobalt);line-height:1.1;letter-spacing:-.02em}
.ch-desc{font-size:.95rem;color:var(--muted);margin-top:10px;font-style:italic;line-height:1.65;font-family:var(--font-serif)}
.ch-meta{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.ch-meta-pill{display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:4px 12px}

/* ─── Toolbar ─── */
.content-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.ct-count{font-size:.82rem;color:var(--muted);font-style:italic}
.ct-count strong{color:var(--gold);font-style:normal}
.pos-pills{display:flex;gap:5px;flex-wrap:wrap}
.pos-pill{padding:5px 13px;border-radius:99px;border:1.5px solid var(--border2);background:var(--surface);font-size:.75rem;color:var(--muted);font-weight:500;transition:all var(--t);white-space:nowrap}
.pos-pill:hover{border-color:var(--gold);color:var(--gold)}
.pos-pill.active{background:var(--gold);border-color:var(--gold);color:white}

/* ─── Section Divider ─── */
.sec-divider{display:flex;align-items:center;gap:14px;margin:44px 0 24px}
.sec-divider:first-child{margin-top:0}
.sec-div-accent{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.sec-div-title{font-family:var(--font-serif);font-size:1.05rem;font-weight:700;color:var(--cobalt)}
.sec-div-desc{font-size:.75rem;color:var(--muted);margin-top:1px}
.sec-div-rule{flex:1;height:1px;background:var(--border)}
.sec-div-cnt{font-size:.7rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:3px 10px;white-space:nowrap}

/* ─── Word Card ─── */
.entries-list{display:flex;flex-direction:column}
.word-card{padding:28px 0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:210px 1fr;gap:32px;animation:cardReveal .45s ease both;transition:background var(--t)}
@keyframes cardReveal{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.word-card:last-child{border-bottom:none}
.wc-left{}
.wc-word-row{display:flex;align-items:flex-start;gap:8px}
.wc-word{font-family:var(--font-serif);font-size:1.65rem;font-weight:700;color:var(--cobalt);line-height:1.05;letter-spacing:-.02em}
.tts-btn{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t);margin-top:6px}
.tts-btn:hover{background:var(--gold-pale);border-color:var(--gold);color:var(--gold);transform:scale(1.1)}
.tts-btn.speaking{background:var(--gold);border-color:var(--gold);color:white;animation:ttsGlow .6s ease infinite alternate}
@keyframes ttsGlow{from{box-shadow:0 0 0 0 rgba(184,129,58,.4)}to{box-shadow:0 0 0 6px rgba(184,129,58,0)}}
.wc-pronounce{font-family:var(--font-mono);font-size:.72rem;color:var(--faint);margin-top:5px;letter-spacing:.02em}
.wc-pos{display:inline-flex;align-items:center;margin-top:9px;padding:3px 9px;background:var(--cobalt);color:white;border-radius:4px;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.wc-bangla{font-family:var(--font-bn);font-size:1.1rem;font-weight:600;color:var(--rust);margin-top:12px;line-height:1.4}
.wc-def{font-family:var(--font-serif);font-size:.95rem;line-height:1.8;color:var(--ink2);font-style:italic;padding:12px 16px;background:var(--gold-pale);border-left:3px solid var(--gold);border-radius:0 var(--r-md) var(--r-md) 0;margin-bottom:18px}
.sa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sa-box{padding:10px 14px;border-radius:var(--r-md);border:1px solid}
.sa-box.syn{background:#f0f8f1;border-color:#b8d8bc}
.sa-box.ant{background:#fef2ef;border-color:#e8bcb4}
.sa-label{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.sa-box.syn .sa-label{color:var(--sage)}
.sa-box.ant .sa-label{color:var(--rust)}
.sa-en{font-weight:600;font-size:.88rem;color:var(--ink)}
.sa-bn{font-family:var(--font-bn);font-size:.75rem;color:var(--muted);display:block;margin-top:2px}
.wc-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.wc-row-key{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);min-width:76px;flex-shrink:0;padding-top:2px;font-family:var(--font-mono)}
.wc-row-val{font-size:.875rem;color:var(--ink2);line-height:1.55}
.hier-wrap{display:flex;gap:6px;flex-wrap:wrap}
.hier-chip{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;padding:3px 10px;border-radius:4px;border:1px solid}
.hier-chip.up{background:#eef2fa;border-color:#c8d4ee;color:var(--cobalt)}
.hier-chip.down{background:#f2edf8;border-color:#cbbde8;color:var(--violet)}
.hier-arrow{font-size:.6rem;opacity:.6}
.colloc-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.colloc-chip{font-family:var(--font-mono);font-size:.7rem;padding:3px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;color:var(--ink2);white-space:nowrap;transition:all var(--t)}
.colloc-chip:hover{background:var(--gold-pale);border-color:var(--gold);color:var(--gold)}
.empty-state{text-align:center;padding:80px 20px;color:var(--faint)}
.empty-icon{font-size:3rem;margin-bottom:16px;filter:grayscale(1) opacity(.5)}
.empty-text{font-style:italic;font-size:.95rem;color:var(--muted)}

/* ─── Toast ─── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--dk-card);color:var(--dk-text);border:1px solid var(--dk-border);border-radius:var(--r-md);padding:10px 18px;font-size:.82rem;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:toastSlide .22s ease;pointer-events:all;display:flex;align-items:center;gap:10px}
.toast.s{border-color:rgba(52,199,124,.4);background:rgba(52,199,124,.12);color:var(--dk-green)}
.toast.e{border-color:rgba(240,112,112,.4);background:rgba(240,112,112,.1);color:var(--dk-red)}
@keyframes toastSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ═══════════════════════════════════════
   QUIZ MODAL
═══════════════════════════════════════ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal-overlay.open{display:flex}
.quiz-shell{width:100%;max-width:680px;margin:auto;min-height:min(92vh,700px);display:flex;flex-direction:column;background:var(--dk-bg);border-radius:var(--r-xl);overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.6);animation:modalPop .25s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes modalPop{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.quiz-screen{display:none;flex:1;flex-direction:column}
.quiz-screen.active{display:flex}
.quiz-back-btn{display:flex;align-items:center;gap:5px;background:none;border:none;color:var(--dk-muted);font-size:.8rem;padding:8px 12px;border-radius:var(--r-md);transition:all var(--t)}
.quiz-back-btn:hover{color:var(--dk-text);background:rgba(255,255,255,.06)}
.qs-inner{max-width:520px;margin:0 auto;padding:40px 28px 52px;display:flex;flex-direction:column;align-items:center;text-align:center}
.qs-icon{font-size:3rem;margin-bottom:14px}
.qs-title{font-family:var(--font-serif);font-size:1.8rem;font-weight:700;color:var(--dk-text);margin-bottom:6px}
.qs-subtitle{font-size:.88rem;color:var(--dk-muted);margin-bottom:32px}
.qs-options{width:100%;display:flex;flex-direction:column;gap:20px;text-align:left}
.qs-opt-group{display:flex;flex-direction:column;gap:8px}
.qs-opt-label{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dk-muted);font-family:var(--font-mono)}
.qs-select{padding:10px 14px;background:var(--dk-card);border:1px solid var(--dk-border);border-radius:var(--r-md);color:var(--dk-text);font-size:.875rem;outline:none;transition:border-color var(--t)}
.qs-select:focus{border-color:var(--dk-accent)}
.qs-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qs-type-card{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 10px;background:var(--dk-card);border:1.5px solid var(--dk-border);border-radius:var(--r-lg);cursor:pointer;transition:all var(--t);text-align:center}
.qs-type-card:hover{border-color:var(--dk-accent);background:rgba(74,158,255,.05)}
.qs-type-card input{display:none}
.qs-type-card:has(input:checked){border-color:var(--dk-accent);background:rgba(74,158,255,.1)}
.qtc-icon{font-size:1.2rem}
.qtc-text{font-size:.72rem;color:var(--dk-muted);font-weight:500}
.qs-type-card:has(input:checked) .qtc-text{color:var(--dk-accent)}
.qs-count-row{display:flex;gap:7px;flex-wrap:wrap}
.qs-count-btn{padding:7px 18px;background:var(--dk-card);border:1.5px solid var(--dk-border);border-radius:var(--r-md);color:var(--dk-muted);font-size:.85rem;font-weight:600;transition:all var(--t)}
.qs-count-btn:hover{border-color:var(--dk-accent);color:var(--dk-accent)}
.qs-count-btn.active{background:var(--dk-accent);border-color:var(--dk-accent);color:white}
.qs-start-btn{margin-top:28px;width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--r-lg);color:white;font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:all var(--t);box-shadow:0 4px 20px rgba(184,129,58,.3)}
.qs-start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(184,129,58,.4)}
.qp-header{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--dk-border);flex-shrink:0}
.qp-progress-wrap{flex:1}
.qp-progress-bar{height:5px;background:var(--dk-border);border-radius:99px;overflow:hidden}
.qp-progress-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--gold2));border-radius:99px;transition:width .4s ease}
.qp-progress-txt{font-size:.72rem;color:var(--dk-muted);margin-top:5px;font-family:var(--font-mono)}
.qp-score-badge{padding:4px 12px;background:rgba(52,199,124,.12);border:1px solid rgba(52,199,124,.25);border-radius:99px;font-size:.78rem;color:var(--dk-green);font-weight:700;white-space:nowrap}
.qp-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;gap:20px}
.qp-type-label{font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dk-muted);font-family:var(--font-mono)}
.qp-card{width:100%;max-width:480px;background:var(--dk-card);border:1px solid var(--dk-border);border-radius:20px;padding:36px 28px;text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 40px rgba(0,0,0,.3);position:relative;transition:all .3s ease}
.qp-card-front{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
.qp-word{font-family:var(--font-serif);font-size:2.2rem;font-weight:700;color:var(--dk-text);line-height:1.1;letter-spacing:-.02em}
.qp-word.bn{font-family:var(--font-bn);font-size:1.7rem;color:#f0a880}
.qp-word.def{font-size:1rem;font-style:italic;color:var(--dk-muted);line-height:1.7;font-family:var(--font-serif)}
.qp-hint{font-size:.75rem;color:var(--dk-faint);font-family:var(--font-mono)}
.qp-tts-btn{width:34px;height:34px;border-radius:50%;background:rgba(184,129,58,.12);border:1px solid rgba(184,129,58,.25);color:var(--gold2);display:flex;align-items:center;justify-content:center;transition:all var(--t)}
.qp-tts-btn:hover{background:rgba(184,129,58,.25);transform:scale(1.1)}
.qp-reveal-btn{padding:12px 28px;background:rgba(255,255,255,.06);border:1.5px solid var(--dk-border2);border-radius:var(--r-xl);color:var(--dk-text);font-size:.875rem;font-weight:600;display:flex;align-items:center;gap:8px;transition:all var(--t)}
.qp-reveal-btn:hover{background:rgba(255,255,255,.1);border-color:var(--gold);color:var(--gold)}
.qp-reveal-zone{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}
.qp-answer-box{background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.2);border-radius:var(--r-lg);padding:18px 22px;text-align:center;animation:answerReveal .35s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes answerReveal{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.qa-main{font-family:var(--font-serif);font-size:1.4rem;font-weight:700;color:var(--dk-text)}
.qa-main.bn{font-family:var(--font-bn);font-size:1.2rem;color:#f0a880}
.qa-def{font-size:.8rem;color:var(--dk-muted);font-style:italic;margin-top:6px;line-height:1.5}
.qp-judge-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qp-judge-btn{padding:11px;border-radius:var(--r-lg);font-size:.85rem;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:all var(--t);border:1.5px solid}
.qp-judge-btn.wrong{background:rgba(240,112,112,.1);border-color:rgba(240,112,112,.3);color:var(--dk-red)}
.qp-judge-btn.wrong:hover{background:rgba(240,112,112,.2);transform:scale(1.02)}
.qp-judge-btn.right{background:rgba(52,199,124,.1);border-color:rgba(52,199,124,.3);color:var(--dk-green)}
.qp-judge-btn.right:hover{background:rgba(52,199,124,.2);transform:scale(1.02)}
.qr-inner{max-width:460px;margin:0 auto;padding:40px 24px 52px;display:flex;flex-direction:column;align-items:center;text-align:center}
.qr-trophy{font-size:3.2rem;margin-bottom:10px;animation:trophyPop .6s cubic-bezier(0.34,1.56,0.64,1) both .3s}
@keyframes trophyPop{from{opacity:0;transform:scale(0) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
.qr-title{font-family:var(--font-serif);font-size:1.7rem;font-weight:700;color:var(--dk-text);margin-bottom:24px}
.qr-score-ring{position:relative;width:130px;height:130px;margin-bottom:24px}
.qr-ring-svg{width:100%;height:100%}
.qr-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.qr-pct{font-family:var(--font-serif);font-size:1.9rem;font-weight:900;color:var(--gold2)}
.qr-pct-lbl{font-size:.65rem;color:var(--dk-muted);text-transform:uppercase;letter-spacing:.1em}
.qr-stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.qr-stat{padding:10px 18px;background:var(--dk-card);border:1px solid var(--dk-border);border-radius:var(--r-lg);min-width:80px}
.qr-stat-val{font-family:var(--font-serif);font-size:1.5rem;font-weight:700}
.qr-stat-val.g{color:var(--dk-green)}.qr-stat-val.r{color:var(--dk-red)}
.qr-stat-lbl{font-size:.68rem;color:var(--dk-muted);margin-top:2px}
.qr-missed-section{width:100%;margin-bottom:20px;text-align:left}
.qr-missed-title{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dk-muted);margin-bottom:8px;font-family:var(--font-mono)}
.qr-missed-list{display:flex;flex-wrap:wrap;gap:5px}
.qr-missed-chip{padding:3px 10px;background:rgba(240,112,112,.1);border:1px solid rgba(240,112,112,.25);border-radius:99px;font-size:.75rem;color:var(--dk-red);font-family:var(--font-serif)}
.qr-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.qr-btn{padding:9px 20px;border-radius:var(--r-lg);font-size:.875rem;font-weight:600;transition:all var(--t);border:1.5px solid}
.qr-btn.primary{background:var(--gold);border-color:var(--gold);color:white}
.qr-btn.primary:hover{background:#a06828}
.qr-btn.secondary{background:transparent;border-color:var(--dk-border2);color:var(--dk-muted)}
.qr-btn.secondary:hover{border-color:var(--dk-text);color:var(--dk-text)}

/* ─── Responsive ─── */
@media(max-width:768px){
  .reader-toc{display:none}
  .reader-content{padding:28px 20px 60px}
  .word-card{grid-template-columns:1fr;gap:16px}
  .reader-topbar{padding:0 14px;gap:10px}
  .rtb-brand-name .rtb-brand-main{font-size:.85rem}
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadScreen">
  <div class="load-book">📖</div>
  <div class="load-title">VocabBook</div>
  <div class="load-sub">শব্দ ভান্ডার — Loading vocabulary…</div>
  <div class="load-bar"><div class="load-bar-fill"></div></div>
  <div class="load-err" id="loadErr"></div>
</div>

<!-- Reader -->
<div id="readerWrap" style="display:none">
  <header class="reader-topbar">
    <div class="rtb-brand">
      <div class="rtb-brand-icon">📖</div>
      <div class="rtb-brand-name">
        <span class="rtb-brand-main" id="brandTitle">My Vocabulary Book</span>
        <span class="rtb-brand-bn" id="brandBn">শব্দ ভান্ডার</span>
      </div>
    </div>
    <div class="rtb-divider"></div>
    <div class="rtb-search-wrap">
      <svg class="rtb-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="rtb-search" type="text" id="bookSearch" placeholder="Search words, meanings, collocations…" oninput="renderBook()">
    </div>
    <button class="rtb-quiz-btn" onclick="openQuiz()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Quiz
    </button>
  </header>
  <div class="reader-layout">
    <aside class="reader-toc" id="bookToc"></aside>
    <main class="reader-content" id="bookContent"></main>
  </div>
</div>

<!-- Quiz Modal -->
<div class="modal-overlay" id="quizModal">
  <div class="quiz-shell">
    <div id="quizSetup" class="quiz-screen active">
      <div class="qs-inner">
        <button class="quiz-back-btn" onclick="closeModal('quizModal')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> Back
        </button>
        <div class="qs-icon">🧠</div>
        <h2 class="qs-title">Active Recall Quiz</h2>
        <p class="qs-subtitle">Test yourself with flashcard-style questions</p>
        <div class="qs-options">
          <div class="qs-opt-group">
            <label class="qs-opt-label">Quiz Scope</label>
            <select class="qs-select" id="quizSection"><option value="">All Words</option></select>
          </div>
          <div class="qs-opt-group">
            <label class="qs-opt-label">Question Type</label>
            <div class="qs-type-grid">
              <label class="qs-type-card"><input type="radio" name="quizType" value="en2bn" checked><span class="qtc-icon">🇬🇧→🇧🇩</span><span class="qtc-text">English → Bangla</span></label>
              <label class="qs-type-card"><input type="radio" name="quizType" value="bn2en"><span class="qtc-icon">🇧🇩→🇬🇧</span><span class="qtc-text">Bangla → English</span></label>
              <label class="qs-type-card"><input type="radio" name="quizType" value="def2en"><span class="qtc-icon">📖→🔤</span><span class="qtc-text">Definition → Word</span></label>
              <label class="qs-type-card"><input type="radio" name="quizType" value="mixed"><span class="qtc-icon">🎲</span><span class="qtc-text">Mixed Mode</span></label>
            </div>
          </div>
          <div class="qs-opt-group">
            <label class="qs-opt-label">Number of Questions</label>
            <div class="qs-count-row">
              <button class="qs-count-btn" onclick="setQuizCount(5)">5</button>
              <button class="qs-count-btn active" onclick="setQuizCount(10)">10</button>
              <button class="qs-count-btn" onclick="setQuizCount(20)">20</button>
              <button class="qs-count-btn" onclick="setQuizCount(999)">All</button>
            </div>
          </div>
        </div>
        <button class="qs-start-btn" onclick="startQuiz()">Start Quiz <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
    <div id="quizPlay" class="quiz-screen">
      <div class="qp-header">
        <button class="quiz-back-btn" onclick="backToQuizSetup()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="qp-progress-wrap"><div class="qp-progress-bar"><div class="qp-progress-fill" id="quizProgressFill"></div></div><div class="qp-progress-txt" id="quizProgressTxt">1 / 10</div></div>
        <div class="qp-score-badge" id="quizScoreBadge">0 ✓</div>
      </div>
      <div class="qp-body">
        <div class="qp-type-label" id="quizTypeLabel">English → Bangla</div>
        <div class="qp-card" id="quizCard">
          <div class="qp-card-front" id="quizFront">
            <div class="qp-word" id="quizWord"></div>
            <button class="qp-tts-btn" id="quizTtsBtn" onclick="speakQuizWord()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>
            <div class="qp-hint" id="quizHint"></div>
          </div>
        </div>
        <div class="qp-reveal-zone" id="quizRevealZone" style="display:none">
          <div class="qp-answer-box" id="quizAnswerBox"></div>
          <div class="qp-judge-row">
            <button class="qp-judge-btn wrong" onclick="judgeAnswer(false)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Wrong</button>
            <button class="qp-judge-btn right" onclick="judgeAnswer(true)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Correct</button>
          </div>
        </div>
        <button class="qp-reveal-btn" id="quizRevealBtn" onclick="revealAnswer()">Reveal Answer <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>
    <div id="quizResults" class="quiz-screen">
      <div class="qr-inner">
        <div class="qr-trophy" id="quizTrophy">🏆</div>
        <h2 class="qr-title" id="quizResultTitle">Quiz Complete!</h2>
        <div class="qr-score-ring"><svg viewBox="0 0 100 100" class="qr-ring-svg"><circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="8"/><circle cx="50" cy="50" r="42" fill="none" stroke="var(--gold2)" stroke-width="8" stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round" transform="rotate(-90 50 50)" id="quizRingFill" style="transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1)"/></svg><div class="qr-ring-text"><div class="qr-pct" id="quizPct">0%</div><div class="qr-pct-lbl">score</div></div></div>
        <div class="qr-stats" id="quizStats"></div>
        <div class="qr-missed-section" id="quizMissedSection" style="display:none"><div class="qr-missed-title">Missed Words</div><div class="qr-missed-list" id="quizMissedList"></div></div>
        <div class="qr-actions">
          <button class="qr-btn secondary" onclick="backToQuizSetup()">New Quiz</button>
          <button class="qr-btn primary" onclick="retryMissed()" id="quizRetryBtn" style="display:none">Retry Missed</button>
          <button class="qr-btn secondary" onclick="closeModal('quizModal')">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
// ════════════════════════════════════════
//  CONFIG — ⚠️ Update this path if needed
// ════════════════════════════════════════
const DATA_URL = './data/words.json';

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
const POS_LABELS = { n:'Noun', v:'Verb', adj:'Adjective', adv:'Adverb', phrasal:'Phrasal Verb', other:'Other' };
let S = { sections:[], words:[], meta:{} };
let bookActiveSec = null;
let bookPosFilter = '';
const getSec = id => S.sections.find(s => s.id === id) || null;

// ════════════════════════════════════════
//  LOAD DATA FROM words.json
// ════════════════════════════════════════
async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
    const data = await res.json();
    S.sections = data.sections || [];
    S.words = data.words || [];
    S.meta = data.meta || {};
    // Update branding from meta
    if (S.meta.title) document.getElementById('brandTitle').textContent = S.meta.title;
    if (S.meta.subtitle) document.getElementById('brandBn').textContent = S.meta.subtitle;
    // Hide loader, show reader
    setTimeout(() => {
      document.getElementById('loadScreen').classList.add('fade');
      document.getElementById('readerWrap').style.display = 'block';
      setTimeout(() => document.getElementById('loadScreen').style.display = 'none', 500);
    }, 800);
    renderBook();
    populateQuizSection();
  } catch(err) {
    const errEl = document.getElementById('loadErr');
    errEl.style.display = 'block';
    errEl.innerHTML = `⚠️ Could not load vocabulary data.<br><strong>${err.message}</strong><br><br>
      Make sure <code>data/words.json</code> exists next to this file.<br>
      If running locally, use a local server (VS Code Live Server, or<br>
      run: <code>npx serve .</code> in the project folder).`;
  }
}

// ════════════════════════════════════════
//  BOOK RENDER
// ════════════════════════════════════════
function renderBook() { renderBookToc(); renderBookContent(); }

function renderBookToc() {
  const isAll = bookActiveSec === null;
  const items = S.sections.map(s => {
    const cnt = S.words.filter(w => w.sectionId === s.id).length;
    return `<div class="toc-ch-item${bookActiveSec===s.id?' active':''}" onclick="bookSelectSec('${s.id}')">
      <div class="toc-ch-dot" style="background:${s.color}"></div>
      <span class="toc-ch-name">${s.name}</span>
      <span class="toc-ch-cnt">${cnt}</span>
    </div>`;
  }).join('');
  document.getElementById('bookToc').innerHTML = `
    <div class="toc-inner">
      <div class="toc-bookinfo">
        <div class="toc-book-name">${S.meta.title||'My Vocabulary Book'}</div>
        <div class="toc-book-bn">${S.meta.subtitle||'শব্দ ভান্ডার'}</div>
      </div>
      <div style="padding:8px 0 4px">
        <div class="toc-all-btn${isAll?' active':''}" onclick="bookSelectSec(null)">
          <div class="toc-all-icon">📚</div>
          <span class="toc-all-text">All Chapters</span>
          <span class="toc-all-count">${S.words.length}</span>
        </div>
      </div>
      <div class="toc-section-label">Chapters</div>
      ${items}
    </div>`;
}

function renderBookContent() {
  const content = document.getElementById('bookContent');
  const q = (document.getElementById('bookSearch').value||'').toLowerCase().trim();
  let baseWords = S.words;
  if (bookActiveSec) baseWords = baseWords.filter(w => w.sectionId === bookActiveSec);
  if (q) baseWords = baseWords.filter(w =>
    (w.word||'').toLowerCase().includes(q)||(w.bangla||'').includes(q)||
    (w.denotation||'').toLowerCase().includes(q)||
    (w.synonym?.en||'').toLowerCase().includes(q)||
    (w.collocations||[]).some(c=>c.toLowerCase().includes(q))
  );
  const posCounts={};
  baseWords.forEach(w=>{posCounts[w.pos]=(posCounts[w.pos]||0)+1;});
  const poss=Object.keys(posCounts);
  let words = bookPosFilter ? baseWords.filter(w=>w.pos===bookPosFilter) : baseWords;
  const sec = bookActiveSec ? getSec(bookActiveSec) : null;
  const pillsHtml = poss.length>1 ? `<div class="pos-pills">
    <button class="pos-pill${bookPosFilter===''?' active':''}" onclick="bookSetPos('')">All <span style="opacity:.6;font-size:.68rem">(${baseWords.length})</span></button>
    ${poss.map(p=>`<button class="pos-pill${bookPosFilter===p?' active':''}" onclick="bookSetPos('${p}')">${POS_LABELS[p]||p} <span style="opacity:.6;font-size:.68rem">(${posCounts[p]})</span></button>`).join('')}
  </div>` : '';
  let heading = sec ? `<div class="ch-header">
    <div class="ch-label">Chapter</div>
    <div class="ch-title">${sec.name}</div>
    ${sec.desc?`<div class="ch-desc">${sec.desc}</div>`:''}
    <div class="ch-meta"><div class="ch-meta-pill"><span style="color:${sec.color};font-size:.8rem">●</span>${baseWords.length} word${baseWords.length!==1?'s':''}</div></div>
  </div>` : `<div class="ch-header">
    <div class="ch-label">Complete Collection</div>
    <div class="ch-title">All Vocabulary</div>
    <div class="ch-desc">Every entry across all chapters, all in one place</div>
    <div class="ch-meta">
      <div class="ch-meta-pill">📖 ${S.words.length} words</div>
      <div class="ch-meta-pill">📂 ${S.sections.length} chapters</div>
    </div>
  </div>`;
  if (!words.length) {
    content.innerHTML = heading+`<div style="margin-bottom:16px">${pillsHtml}</div><div class="empty-state"><div class="empty-icon">📭</div><p class="empty-text">No words found${q?` matching "<em>${q}</em>"`:''}${bookPosFilter?` for "${POS_LABELS[bookPosFilter]||bookPosFilter}"`:''}.</p></div>`;
    return;
  }
  const toolbar = `<div class="content-toolbar"><span class="ct-count">Showing <strong>${words.length}</strong>${bookPosFilter?' filtered':''} entr${words.length!==1?'ies':'y'}</span>${pillsHtml}</div>`;
  let entriesHtml = '';
  if (bookActiveSec) {
    entriesHtml = `<div class="entries-list">${words.map((w,i)=>wordCardHtml(w,i)).join('')}</div>`;
  } else {
    const grouped={};const noSec=[];
    words.forEach(w=>{if(w.sectionId&&getSec(w.sectionId)){(grouped[w.sectionId]=grouped[w.sectionId]||[]).push(w);}else noSec.push(w);});
    S.sections.forEach(s=>{
      if(!grouped[s.id])return;
      entriesHtml+=`<div class="sec-divider"><div class="sec-div-accent" style="background:${s.color}"></div><div><div class="sec-div-title">${s.name}</div>${s.desc?`<div class="sec-div-desc">${s.desc}</div>`:''}</div><div class="sec-div-rule"></div><div class="sec-div-cnt">${grouped[s.id].length} words</div></div><div class="entries-list">${grouped[s.id].map((w,i)=>wordCardHtml(w,i)).join('')}</div>`;
    });
    if(noSec.length) entriesHtml+=`<div class="sec-divider"><div class="sec-div-accent" style="background:#8a7e6e"></div><div><div class="sec-div-title">Uncategorized</div></div><div class="sec-div-rule"></div><div class="sec-div-cnt">${noSec.length} words</div></div><div class="entries-list">${noSec.map((w,i)=>wordCardHtml(w,i)).join('')}</div>`;
  }
  content.innerHTML = heading + toolbar + entriesHtml;
}

function wordCardHtml(w,i) {
  const collocs=(w.collocations||[]).map(c=>`<span class="colloc-chip">${c}</span>`).join('');
  const hier=(w.hypernym||w.hyponym)?`<div class="wc-row"><span class="wc-row-key">Hierarchy</span><span class="wc-row-val"><div class="hier-wrap">${w.hypernym?`<span class="hier-chip up"><span class="hier-arrow">↑</span>${w.hypernym}</span>`:''}${w.hyponym?`<span class="hier-chip down"><span class="hier-arrow">↓</span>${w.hyponym}</span>`:''}</div></span></div>`:'';
  return `<div class="word-card" style="animation-delay:${Math.min(i,12)*.038}s" id="wcard-${w.id}">
    <div class="wc-left">
      <div class="wc-word-row">
        <div class="wc-word">${w.word}</div>
        <button class="tts-btn" onclick="speakWord('${w.id}')" title="Listen" aria-label="Pronounce ${w.word}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
      </div>
      ${w.pronounce?`<div class="wc-pronounce">${w.pronounce}</div>`:''}
      <div class="wc-pos">${w.posLabel||POS_LABELS[w.pos]||w.pos}</div>
      <div class="wc-bangla">${w.bangla}</div>
    </div>
    <div class="wc-right">
      <div class="wc-def">${w.denotation}</div>
      <div class="sa-grid">
        <div class="sa-box syn"><div class="sa-label">Synonym</div><div class="sa-en">${w.synonym?.en||'—'}</div>${w.synonym?.bn?`<span class="sa-bn">${w.synonym.bn}</span>`:''}</div>
        <div class="sa-box ant"><div class="sa-label">Antonym</div><div class="sa-en">${w.antonym?.en||'—'}</div>${w.antonym?.bn?`<span class="sa-bn">${w.antonym.bn}</span>`:''}</div>
      </div>
      ${hier}
      ${collocs?`<div class="wc-row"><span class="wc-row-key">Collocations</span><span class="wc-row-val"><div class="colloc-wrap">${collocs}</div></span></div>`:''}
    </div>
  </div>`;
}

function bookSelectSec(id){bookActiveSec=id;renderBook();}
function bookSetPos(p){bookPosFilter=p;renderBookContent();}

// ════════════════════════════════════════
//  TTS
// ════════════════════════════════════════
let ttsActive=null;
function speakWord(wordId){
  const w=S.words.find(x=>x.id===wordId);
  if(!w||!window.speechSynthesis){toast('TTS not supported','e');return;}
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(w.word);
  utt.lang='en-US';utt.rate=0.88;
  const voices=window.speechSynthesis.getVoices();
  const eng=voices.find(v=>v.lang.startsWith('en')&&v.localService)||voices.find(v=>v.lang.startsWith('en'));
  if(eng)utt.voice=eng;
  const btn=document.querySelector(`#wcard-${wordId} .tts-btn`);
  if(btn){btn.classList.add('speaking');ttsActive=btn;}
  utt.onend=utt.onerror=()=>{if(ttsActive){ttsActive.classList.remove('speaking');ttsActive=null;}};
  window.speechSynthesis.speak(utt);
}
function speakQuizWord(){
  const w=quizState.queue[quizState.current];
  if(!w||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(w.word);
  utt.lang='en-US';utt.rate=0.88;
  const voices=window.speechSynthesis.getVoices();
  const eng=voices.find(v=>v.lang.startsWith('en')&&v.localService)||voices.find(v=>v.lang.startsWith('en'));
  if(eng)utt.voice=eng;
  window.speechSynthesis.speak(utt);
}
if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

// ════════════════════════════════════════
//  QUIZ
// ════════════════════════════════════════
let quizState={queue:[],current:0,score:0,missed:[],count:10,type:'en2bn',currentType:'en2bn'};
function populateQuizSection(){const sel=document.getElementById('quizSection');sel.innerHTML='<option value="">All Words</option>'+S.sections.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');}
function openQuiz(){populateQuizSection();showQuizScreen('quizSetup');openModal('quizModal');}
function showQuizScreen(id){document.querySelectorAll('.quiz-screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setQuizCount(n){quizState.count=n;document.querySelectorAll('.qs-count-btn').forEach(b=>{b.classList.toggle('active',parseInt(b.textContent)===n||(b.textContent==='All'&&n===999));});}
function startQuiz(){
  const secId=document.getElementById('quizSection').value;
  const type=document.querySelector('input[name="quizType"]:checked')?.value||'en2bn';
  let pool=S.words.filter(w=>w.word&&w.bangla&&w.denotation);
  if(secId)pool=pool.filter(w=>w.sectionId===secId);
  if(!pool.length){toast('No words available','e');return;}
  pool=pool.sort(()=>Math.random()-.5);
  const q=Math.min(quizState.count,pool.length);
  quizState={queue:pool.slice(0,q),current:0,score:0,missed:[],count:q,type,currentType:type};
  showQuizScreen('quizPlay');renderQuizQuestion();
}
function getQuizType(){if(quizState.type!=='mixed')return quizState.type;return['en2bn','bn2en','def2en'][Math.floor(Math.random()*3)];}
function renderQuizQuestion(){
  const{queue,current,score}=quizState;
  if(current>=queue.length){showQuizResults();return;}
  const w=queue[current];const total=queue.length;
  document.getElementById('quizProgressFill').style.width=(current/total*100)+'%';
  document.getElementById('quizProgressTxt').textContent=`${current+1} / ${total}`;
  document.getElementById('quizScoreBadge').textContent=`${score} ✓`;
  const qtype=getQuizType();quizState.currentType=qtype;
  const labels={en2bn:'English → Bangla',bn2en:'Bangla → English',def2en:'Definition → Word'};
  document.getElementById('quizTypeLabel').textContent=labels[qtype]||'';
  const wordEl=document.getElementById('quizWord');
  wordEl.className='qp-word';
  if(qtype==='en2bn'){wordEl.textContent=w.word;document.getElementById('quizHint').textContent=w.pronounce||'';document.getElementById('quizTtsBtn').style.display='flex';}
  else if(qtype==='bn2en'){wordEl.className='qp-word bn';wordEl.textContent=w.bangla;document.getElementById('quizHint').textContent=`POS: ${POS_LABELS[w.pos]||w.pos}`;document.getElementById('quizTtsBtn').style.display='none';}
  else{wordEl.className='qp-word def';wordEl.textContent=`"${w.denotation}"`;document.getElementById('quizHint').textContent=`POS: ${POS_LABELS[w.pos]||w.pos}`;document.getElementById('quizTtsBtn').style.display='none';}
  document.getElementById('quizRevealZone').style.display='none';
  document.getElementById('quizRevealBtn').style.display='flex';
  document.getElementById('quizCard').style.borderColor='var(--dk-border)';
  document.getElementById('quizCard').style.background='var(--dk-card)';
}
function revealAnswer(){
  const w=quizState.queue[quizState.current];const qtype=quizState.currentType;
  let html='';
  if(qtype==='en2bn'){html=`<div class="qa-main bn">${w.bangla}</div>`;if(w.synonym?.en)html+=`<div class="qa-def">Syn: ${w.synonym.en} · Ant: ${w.antonym?.en||'—'}</div>`;}
  else if(qtype==='bn2en'){html=`<div class="qa-main">${w.word}</div>`;if(w.pronounce)html+=`<div class="qa-def">${w.pronounce}</div>`;html+=`<div class="qa-def" style="margin-top:5px;font-style:italic">${w.denotation}</div>`;}
  else{html=`<div class="qa-main">${w.word}</div><div class="qa-def">${w.bangla}</div>${w.pronounce?`<div class="qa-def">${w.pronounce}</div>`:''}`;}
  document.getElementById('quizAnswerBox').innerHTML=html;
  document.getElementById('quizRevealBtn').style.display='none';
  document.getElementById('quizRevealZone').style.display='flex';
  if(window.speechSynthesis&&(qtype==='bn2en'||qtype==='def2en')){setTimeout(()=>{const utt=new SpeechSynthesisUtterance(w.word);utt.lang='en-US';utt.rate=0.88;window.speechSynthesis.speak(utt);},300);}
}
function judgeAnswer(correct){
  const w=quizState.queue[quizState.current];
  if(correct){quizState.score++;document.getElementById('quizCard').style.borderColor='rgba(52,199,124,.5)';document.getElementById('quizCard').style.background='rgba(52,199,124,.05)';}
  else{quizState.missed.push(w);document.getElementById('quizCard').style.borderColor='rgba(240,112,112,.5)';document.getElementById('quizCard').style.background='rgba(240,112,112,.05)';}
  document.getElementById('quizScoreBadge').textContent=`${quizState.score} ✓`;
  setTimeout(()=>{quizState.current++;renderQuizQuestion();},500);
}
function showQuizResults(){
  const{queue,score,missed}=quizState;const total=queue.length;const pct=Math.round(score/total*100);
  const emoji=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  document.getElementById('quizTrophy').textContent=emoji;
  document.getElementById('quizResultTitle').textContent=pct>=90?'Outstanding!':pct>=70?'Great Job!':pct>=50?'Good Effort!':'Keep Practicing!';
  document.getElementById('quizPct').textContent=pct+'%';
  document.getElementById('quizStats').innerHTML=`<div class="qr-stat"><div class="qr-stat-val g">${score}</div><div class="qr-stat-lbl">Correct</div></div><div class="qr-stat"><div class="qr-stat-val r">${missed.length}</div><div class="qr-stat-lbl">Missed</div></div><div class="qr-stat"><div class="qr-stat-val">${total}</div><div class="qr-stat-lbl">Total</div></div>`;
  const offset=264-(pct/100)*264;
  setTimeout(()=>{document.getElementById('quizRingFill').style.strokeDashoffset=offset;},200);
  if(missed.length>0){document.getElementById('quizMissedSection').style.display='block';document.getElementById('quizMissedList').innerHTML=missed.map(w=>`<span class="qr-missed-chip">${w.word}</span>`).join('');document.getElementById('quizRetryBtn').style.display='inline-flex';}
  else{document.getElementById('quizMissedSection').style.display='none';document.getElementById('quizRetryBtn').style.display='none';}
  showQuizScreen('quizResults');
}
function retryMissed(){const missed=[...quizState.missed];quizState={...quizState,queue:missed.sort(()=>Math.random()-.5),current:0,score:0,missed:[],count:missed.length};showQuizScreen('quizPlay');renderQuizQuestion();}
function backToQuizSetup(){window.speechSynthesis?.cancel();showQuizScreen('quizSetup');document.getElementById('quizRingFill').style.strokeDashoffset='264';}

// ════════════════════════════════════════
//  MODAL & TOAST
// ════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));});
function toast(msg,type=''){const wrap=document.getElementById('toastWrap');const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;wrap.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(16px)';el.style.transition='all .3s';setTimeout(()=>el.remove(),300);},2800);}
